<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSY-CODE（仮）Edge UI Prototype v2 - 32タイプ全文言実装</title>
  <style>
    :root {
      --bg: #050b12;
      --bg-2: #09131d;
      --panel: rgba(8, 20, 31, 0.86);
      --panel-2: rgba(10, 28, 43, 0.9);
      --panel-3: rgba(6, 16, 24, 0.92);
      --line: rgba(72, 218, 212, 0.18);
      --line-strong: rgba(72, 218, 212, 0.45);
      --teal: #2ef2de;
      --teal-2: #14c8d2;
      --mint: #9affcf;
      --amber: #ffbf66;
      --violet: #c58dff;
      --text: #e8fbff;
      --muted: #96b6be;
      --danger: #ffc388;
      --success: #59ffc2;
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --shadow: 0 0 0 1px rgba(46,242,222,0.08), 0 20px 50px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.03);
      --glow: 0 0 0 1px rgba(46,242,222,0.18), 0 0 36px rgba(46,242,222,.12);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background:
        radial-gradient(circle at 16% 80%, rgba(31,214,205,.18), transparent 22%),
        radial-gradient(circle at 80% 18%, rgba(31,214,205,.08), transparent 18%),
        linear-gradient(180deg, #07111b 0%, #050a11 100%);
      color: var(--text);
      letter-spacing: .02em;
    }
    button, input, select, textarea { font: inherit; }
    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid rgba(46,242,222,.12);
      background: linear-gradient(180deg, rgba(4,11,19,.96) 0%, rgba(5,12,20,.92) 100%);
      padding: 18px;
      overflow: auto;
    }
    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 6px 6px 18px;
      margin-bottom: 6px;
    }
    .brand-icon {
      width: 48px; height: 48px; border-radius: 16px;
      background: radial-gradient(circle at 30% 30%, rgba(46,242,222,.28), rgba(20,200,210,.06) 60%), rgba(8, 22, 30, .9);
      border: 1px solid rgba(46,242,222,.22);
      box-shadow: var(--glow);
      display: grid; place-items: center;
      color: var(--teal);
      flex: none;
    }
    .brand-icon svg { width: 26px; height: 26px; }
    .brand h1 {
      font-size: 18px; margin: 0; font-weight: 800;
      letter-spacing: .04em;
    }
    .brand p {
      margin: 4px 0 0; font-size: 12px; color: var(--muted);
    }
    .side-menu { display: grid; gap: 8px; margin: 14px 0 20px; }
    .side-item {
      appearance: none; border: 1px solid transparent; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      width: 100%; text-align: left; padding: 14px 14px;
      border-radius: 16px;
      color: var(--text); background: transparent;
      transition: .22s ease;
    }
    .side-item:hover { background: rgba(255,255,255,.02); border-color: rgba(255,255,255,.04); }
    .side-item.active {
      background: linear-gradient(90deg, rgba(46,242,222,.15), rgba(46,242,222,.03));
      border-color: rgba(46,242,222,.15);
      box-shadow: inset 0 0 0 1px rgba(46,242,222,.05), 0 0 30px rgba(46,242,222,.08);
    }
    .side-item .icon {
      width: 36px; height: 36px; border-radius: 12px;
      display: grid; place-items: center;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      color: var(--teal);
      flex: none;
    }
    .side-item .icon svg { width: 18px; height: 18px; }
    .side-item .label { font-size: 15px; font-weight: 700; }
    .network-art {
      height: 170px;
      position: relative;
      margin: 22px 0 18px;
      border-radius: 22px;
      border: 1px solid rgba(46,242,222,.12);
      background:
        radial-gradient(circle at 30% 60%, rgba(46,242,222,.20), transparent 24%),
        radial-gradient(circle at 72% 72%, rgba(46,242,222,.10), transparent 18%),
        linear-gradient(180deg, rgba(8,18,26,.9), rgba(5,12,18,.95));
      overflow: hidden;
    }
    .network-art::before,
    .network-art::after {
      content: ""; position: absolute; inset: auto auto 0 0;
      width: 100%; height: 100%; pointer-events: none;
      background-image:
        radial-gradient(circle at 18% 78%, rgba(46,242,222,.95) 0 3px, transparent 4px),
        radial-gradient(circle at 30% 64%, rgba(46,242,222,.8) 0 3px, transparent 4px),
        radial-gradient(circle at 46% 72%, rgba(46,242,222,.8) 0 3px, transparent 4px),
        radial-gradient(circle at 60% 56%, rgba(46,242,222,.7) 0 3px, transparent 4px),
        radial-gradient(circle at 74% 62%, rgba(46,242,222,.7) 0 3px, transparent 4px),
        linear-gradient(130deg, transparent 18%, rgba(46,242,222,.18) 18.5%, transparent 19%),
        linear-gradient(155deg, transparent 28%, rgba(46,242,222,.16) 28.5%, transparent 29%),
        linear-gradient(170deg, transparent 44%, rgba(46,242,222,.16) 44.5%, transparent 45%);
      opacity: .9;
    }
    .about-card {
      padding: 18px; border-radius: 20px; background: rgba(7,15,24,.85); border: 1px solid rgba(46,242,222,.12);
      box-shadow: var(--shadow);
    }
    .about-card h3 { margin: 0 0 10px; font-size: 15px; }
    .about-card p { margin: 0; font-size: 13px; line-height: 1.8; color: var(--muted); }
    .about-card .mini-btn { margin-top: 14px; }

    .main { min-width: 0; padding: 18px 18px 28px; }
    .topbar {
      display: flex; gap: 12px; justify-content: space-between; align-items: center;
      padding: 8px 0 18px;
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(12px);
      background: linear-gradient(180deg, rgba(5,11,18,.88), rgba(5,11,18,.58) 75%, transparent 100%);
    }
    .top-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .top-tab {
      border: 1px solid rgba(255,255,255,.06); background: rgba(255,255,255,.02); color: var(--muted);
      border-radius: 999px; padding: 10px 14px; cursor: pointer; font-weight: 700; transition: .2s ease;
    }
    .top-tab.active { color: var(--text); border-color: rgba(46,242,222,.28); box-shadow: inset 0 -2px 0 var(--teal), 0 0 24px rgba(46,242,222,.08); }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn {
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: .2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(46,242,222,.2); }
    .btn.primary { background: linear-gradient(90deg, rgba(46,242,222,.16), rgba(20,200,210,.12)); border-color: rgba(46,242,222,.24); }
    .btn.ghost { color: var(--muted); }
    .btn.small, .mini-btn { padding: 9px 12px; font-size: 13px; }
    .mini-btn {
      border-radius: 12px; display: inline-flex; gap: 8px; align-items: center;
      border: 1px solid rgba(46,242,222,.14); background: rgba(46,242,222,.06); color: var(--text); cursor: pointer;
    }
    .panel {
      background: linear-gradient(180deg, rgba(7,16,25,.95), rgba(6,15,24,.88));
      border: 1px solid rgba(46,242,222,.12);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, .95fr);
      gap: 0;
      overflow: hidden;
    }
    .hero-left {
      min-height: 260px;
      background:
        radial-gradient(circle at 22% 58%, rgba(46,242,222,.22), transparent 28%),
        radial-gradient(circle at 18% 24%, rgba(255,255,255,.08), transparent 8%),
        linear-gradient(180deg, rgba(0,0,0,.0), rgba(0,0,0,.18)),
        linear-gradient(120deg, rgba(7,30,39,.9), rgba(5,14,22,.82));
      position: relative;
      padding: 28px 28px 24px;
      border-right: 1px solid rgba(46,242,222,.1);
    }
    .reef {
      position: absolute; left: 20px; bottom: 14px; width: 36%; max-width: 230px; min-width: 140px; opacity: .9;
      filter: drop-shadow(0 0 22px rgba(46,242,222,.18));
    }
    .hero-kicker { color: #b5dce0; font-weight: 700; font-size: 14px; }
    .hero-code {
      font-size: clamp(72px, 10vw, 128px); line-height: .94; font-weight: 800; letter-spacing: .12em; margin: 18px 0 0 0;
      color: #d8fffb; text-shadow: 0 0 18px rgba(46,242,222,.32), 0 0 42px rgba(46,242,222,.14);
      text-align: center;
      padding-left: 18%;
    }
    .hero-right { padding: 26px 30px; display: grid; grid-template-columns: 1fr 190px; gap: 16px; align-items: center; }
    .eyebrow { font-size: 13px; color: #b1cad0; font-weight: 700; margin-bottom: 10px; }
    .type-name { font-size: clamp(32px, 4vw, 56px); margin: 0; font-weight: 800; line-height: 1.05; }
    .type-role-en { color: var(--teal); font-size: clamp(18px, 2vw, 22px); font-weight: 700; margin-left: 12px; }
    .type-safe { color: var(--success); font-size: 16px; margin-top: 10px; font-weight: 700; }
    .type-edge { font-size: clamp(28px, 3.1vw, 48px); line-height: 1.18; margin: 16px 0 0; font-family: Georgia, "Times New Roman", serif; }
    .gauge-wrap { display: grid; place-items: center; }
    .gauge-title { text-align: center; font-size: 14px; color: #cfeef2; margin-bottom: 12px; font-weight: 700; }
    .gauge {
      width: 152px; height: 152px; border-radius: 50%; position: relative;
      background: conic-gradient(var(--teal) 0 var(--deg), rgba(255,255,255,.06) var(--deg) 360deg);
      display: grid; place-items: center;
      box-shadow: inset 0 0 20px rgba(0,0,0,.26), 0 0 30px rgba(46,242,222,.08);
    }
    .gauge::after {
      content: ""; width: 116px; height: 116px; border-radius: 50%; background: #08141d;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .gauge-value {
      position: absolute; text-align: center; font-size: 20px; font-weight: 700;
      display: flex; flex-direction: column; align-items: center;
    }
    .gauge-value strong { font-size: 28px; line-height: 1.0; }
    .hero-strip {
      display: flex; gap: 18px; padding: 14px 24px; border-top: 1px solid rgba(46,242,222,.1); flex-wrap: wrap;
      color: var(--muted); font-size: 14px;
    }
    .hero-strip .sep { color: rgba(255,255,255,.12); }
    .layout-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
    }
    .cards3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .card {
      background: linear-gradient(180deg, rgba(9,20,31,.95), rgba(7,16,25,.9));
      border: 1px solid rgba(46,242,222,.12); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow);
      min-width: 0;
    }
    .layer-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 38px; height: 38px; border-radius: 999px; font-weight: 800;
      background: linear-gradient(180deg, rgba(223,241,255,.98), rgba(173,215,239,.88)); color: #041018; margin-right: 8px;
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
    .card-title { font-size: 15px; font-weight: 800; }
    .faint-art { opacity: .44; color: var(--teal); }
    .layer-main { display: flex; gap: 14px; align-items: center; margin-top: 8px; }
    .big-circle {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid rgba(46,242,222,.7);
      display: grid; place-items: center; font-size: 28px; font-weight: 800;
      color: #f2ffff;
      box-shadow: inset 0 0 20px rgba(46,242,222,.08);
      flex: none;
    }
    .big-circle.amber { border-color: rgba(255,191,102,.7); box-shadow: inset 0 0 20px rgba(255,191,102,.08); }
    .layer-names strong { display: block; font-size: 15px; }
    .layer-names span { color: #d7f3f7; font-size: 13px; }
    .metric { margin-top: 16px; }
    .metric-row { display: grid; grid-template-columns: 88px 1fr 34px; gap: 10px; align-items: center; margin-top: 8px; }
    .metric-row .label { color: #d4edf0; font-size: 13px; }
    .bar {
      height: 10px; border-radius: 999px; overflow: hidden; position: relative;
      background: rgba(255,255,255,.06);
    }
    .bar > span {
      position: absolute; inset: 0 auto 0 0; width: 0;
      background: linear-gradient(90deg, rgba(46,242,222,.75), rgba(114,255,228,.95));
      border-radius: inherit;
      box-shadow: 0 0 18px rgba(46,242,222,.24);
    }
    .bar.amber > span { background: linear-gradient(90deg, rgba(255,191,102,.7), rgba(255,207,138,.95)); box-shadow: 0 0 18px rgba(255,191,102,.18); }
    .metric-row .value { text-align: right; font-weight: 800; }
    .pill {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 32px; border-radius: 999px; padding: 0 12px; font-size: 13px; font-weight: 700;
      background: rgba(46,242,222,.08); border: 1px solid rgba(46,242,222,.18); color: var(--text);
    }
    .pill.amber { background: rgba(255,191,102,.08); border-color: rgba(255,191,102,.18); }
    .bigfive { padding: 18px; }
    .bigfive h3, .niche-panel h3, .insight-card h3, .section-title { margin: 0 0 14px; font-size: 18px; }
    .info-help { color: var(--muted); font-size: 12px; display: inline-grid; place-items: center; width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,.08); margin-left: 6px; }
    .bf-row {
      display: grid; grid-template-columns: 38px 70px 1fr 34px; gap: 10px; align-items: center; margin: 14px 0;
    }
    .bf-dot {
      width: 38px; height: 38px; border-radius: 999px; border: 2px solid rgba(46,242,222,.46); display: grid; place-items: center; color: var(--teal); font-weight: 800;
    }
    .bf-label { font-weight: 700; }
    .bf-value { text-align: right; font-weight: 800; }
    .stack { display: grid; gap: 18px; }
    .insights-wrap {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin-top: 18px;
    }
    .insight-card {
      padding: 18px; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,.07); box-shadow: var(--shadow);
      min-height: 230px;
    }
    .insight-card.teal { background: linear-gradient(180deg, rgba(5,28,36,.95), rgba(7,20,28,.92)); border-color: rgba(46,242,222,.16); }
    .insight-card.green { background: linear-gradient(180deg, rgba(20,43,24,.92), rgba(15,26,16,.92)); border-color: rgba(154,255,207,.12); }
    .insight-card.amber { background: linear-gradient(180deg, rgba(55,34,13,.92), rgba(31,23,13,.92)); border-color: rgba(255,191,102,.18); }
    .insight-card.violet { background: linear-gradient(180deg, rgba(48,20,62,.92), rgba(23,18,36,.92)); border-color: rgba(197,141,255,.18); }
    .insight-card h3 { display: flex; gap: 10px; align-items: center; }
    .insight-card ul { margin: 12px 0 0 18px; padding: 0; line-height: 1.8; color: #e4f5f7; font-size: 14px; }
    .niche-panel { padding: 18px; }
    .niche-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
    .niche-item {
      min-height: 56px; border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 10px;
      border: 1px solid rgba(46,242,222,.14); background: rgba(46,242,222,.04);
      font-weight: 700;
    }
    .niche-item svg, .icon-sm svg { width: 18px; height: 18px; }
    .footer-note {
      margin-top: 18px; text-align: center; color: var(--muted); font-size: 13px; padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,.04);
    }

    .section { display: none; }
    .section.active { display: block; }

    .question-toolbar, .detail-grid, .eco-grid, .growth-grid {
      display: grid; gap: 18px;
    }
    .question-toolbar { grid-template-columns: 1fr auto auto auto; align-items: center; margin-bottom: 18px; }
    .inline-controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .search, .select {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; color: var(--text);
      padding: 10px 12px;
    }
    .question-list { display: grid; gap: 14px; }
    .question-card { padding: 16px; border-radius: 18px; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); }
    .q-top { display: flex; gap: 12px; align-items: start; justify-content: space-between; }
    .q-id { font-size: 13px; color: var(--muted); font-weight: 700; }
    .q-title { font-size: 15px; line-height: 1.7; margin-top: 6px; }
    .factor-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: rgba(46,242,222,.08); border: 1px solid rgba(46,242,222,.12); color: #d5fbff; font-size: 12px; font-weight: 700; }
    .factor-chip.reverse { background: rgba(255,191,102,.08); border-color: rgba(255,191,102,.16); }
    .scale { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; margin-top: 14px; }
    .scale button {
      border-radius: 14px; padding: 12px 10px; border: 1px solid rgba(255,255,255,.08); cursor: pointer;
      background: rgba(255,255,255,.025); color: var(--text); font-weight: 700; transition: .18s ease;
    }
    .scale button:hover { border-color: rgba(46,242,222,.2); transform: translateY(-1px); }
    .scale button.active { background: linear-gradient(90deg, rgba(46,242,222,.18), rgba(20,200,210,.12)); border-color: rgba(46,242,222,.26); }
    .scale small { display: block; color: var(--muted); font-size: 11px; margin-top: 4px; font-weight: 500; }

    .detail-grid { grid-template-columns: 1.1fr .9fr; }
    .report-card { padding: 18px; }
    .summary-row { display: grid; grid-template-columns: 1fr 140px; gap: 12px; align-items: center; margin-bottom: 12px; }
    .summary-row strong { font-size: 15px; }
    .summary-row .muted { color: var(--muted); }

    .matrix {
      position: relative; border-radius: 20px; overflow: hidden; border: 1px solid rgba(46,242,222,.1);
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)); height: 340px;
    }
    .matrix-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 25% 25%;
    }
    .matrix-center-x, .matrix-center-y { position: absolute; background: rgba(46,242,222,.18); }
    .matrix-center-x { left: 0; right: 0; top: 50%; height: 1px; }
    .matrix-center-y { top: 0; bottom: 0; left: 50%; width: 1px; }
    .matrix-label { position: absolute; font-size: 12px; color: var(--muted); font-weight: 700; }
    .matrix-point {
      position: absolute; width: 18px; height: 18px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--teal) 50%, rgba(46,242,222,.2));
      box-shadow: 0 0 0 6px rgba(46,242,222,.12), 0 0 24px rgba(46,242,222,.32);
      transform: translate(-50%, -50%);
    }
    .matrix-point::after { content: attr(data-label); position: absolute; left: 24px; top: -2px; color: white; font-weight: 800; font-size: 13px; white-space: nowrap; }
    .eco-grid { grid-template-columns: 1fr 1fr; }
    .growth-grid { grid-template-columns: 1fr 1fr; }
    .quote {
      font-size: 20px; line-height: 1.8; color: #e6fbff; font-family: Georgia, serif; margin-top: 10px;
      padding-left: 18px; border-left: 2px solid rgba(46,242,222,.25);
    }
    .muted { color: var(--muted); }
    .tiny { font-size: 12px; }
    .empty-state {
      padding: 26px; border-radius: 20px; background: rgba(255,255,255,.02); border: 1px dashed rgba(255,255,255,.08); color: var(--muted);
      text-align: center;
    }
    @media (max-width: 1260px) {
      .layout-grid { grid-template-columns: 1fr; }
      .insights-wrap { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .cards3 { grid-template-columns: 1fr; }
      .hero { grid-template-columns: 1fr; }
      .hero-left { border-right: none; border-bottom: 1px solid rgba(46,242,222,.1); }
      .hero-right { grid-template-columns: 1fr; }
      .detail-grid, .eco-grid, .growth-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .question-toolbar { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: stretch; }
      .actions { justify-content: flex-start; }
      .insights-wrap { grid-template-columns: 1fr; }
      .hero-code { padding-left: 0; text-align: left; font-size: 74px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">

      const topPairs = Object.entries(result.scores).sort((a,b)=>b[1]-a[1]);

      if (override) return {

      const strengthMap = {

      };
      const riskMap = {
        O:'アイデアが広がりすぎて焦点がぼやける', C:'構造や手順に固着しやすい', E:'刺激過多でエネルギーを使い切りやすい', A:'他者に合わせすぎて境界が薄くなる', N:'不安や警戒が過剰になりやすい'

      };

        niche: meta.niches,

      QUESTIONS.forEach(q => {
        let base = vals[q.factor];
        if (q.id % 5 === 0) base = Math.max(1, Math.min(5, base - 1));
        if (q.id % 7 === 0) base = Math.max(1, Math.min(5, base + 1));
        answers[q.id] = q.reverse ? (6 - base) : base;
      });
      return answers;
    }

    function calcScale(values) {
      const sorted = Object.entries(values).sort((a,b)=>b[1]-a[1]);
      const diff = sorted[0][1] - sorted[1][1];
      const label = diff === 0 ? '同率型' : diff >= 20 ? '明確なタイプ' : diff >= 10 ? 'やや混合型' : 'ハイブリッド型';
      return {
        primary: sorted[0][0],
        primaryScore: Math.round(sorted[0][1]),
        secondary: sorted[1][0],
        secondaryScore: Math.round(sorted[1][1]),
        diff: Math.round(diff),
        label,
        all: values
      };
    }

    function runCalculations(answers) {
      const complete = QUESTIONS.every(q => answers[q.id] !== undefined && answers[q.id] !== null && answers[q.id] !== '');
      if (!complete) return null;
      const transformed = {};
      QUESTIONS.forEach(q => transformed[q.id] = q.reverse ? (6 - Number(answers[q.id])) : Number(answers[q.id]));
      const scoreOf = ids => ((ids.reduce((sum,id)=>sum + transformed[id], 0) - 5) / 20) * 100;
      const O = scoreOf([1,6,11,16,21]);
      const C = scoreOf([2,7,12,17,22]);
      const E = scoreOf([3,8,13,18,24]);
      const A = scoreOf([4,9,14,19,23]);
      const N = scoreOf([5,10,15,20,25]);
      const scores = { O: Math.round(O), C: Math.round(C), E: Math.round(E), A: Math.round(A), N: Math.round(N) };

      const layer1 = calcScale({ F:(O+E)/2, D:(O+(100-E))/2, H:((100-O)+E)/2, P:((100-O)+(100-E))/2 });
      const layer2 = calcScale({ R:(C+(100-N))/2, M:(C+N)/2, G:((100-C)+(100-N))/2, V:((100-C)+N)/2 });
      const layer3 = calcScale({ S:A, I:100-A });
      const code = `${layer1.primary}-${layer2.primary}-${layer3.primary}`;
      const targetO = ['F','D'].includes(layer1.primary) ? O : 100-O;
      const targetE = ['F','H'].includes(layer1.primary) ? E : 100-E;
      const targetC = ['R','M'].includes(layer2.primary) ? C : 100-C;
      const targetN = ['M','V'].includes(layer2.primary) ? N : 100-N;
      const targetA = layer3.primary === 'S' ? A : 100-A;
      const matchScore = Math.round((targetO + targetE + targetC + targetN + targetA)/5);
      const meta = TYPE_META[code] || { organism: code, safeName:'未定義', edgeName:'未定義', role:'Unknown', niches:['検討中'] };
      const copy = getDetailedCopy(code, { layer1, layer2, layer3, scores });
      return { scores, layer1, layer2, layer3, code, meta, matchScore, copy };
    }

        const text = buildShareText(result);
        try {
          await navigator.clipboard.writeText(text);
          alert('共有用テキストをコピーしました。');
        } catch (e) {
          alert('クリップボードへのコピーに失敗しました。');
        }
      };
    }

    function showSection() {
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      document.getElementById(`section-${STATE.currentSection}`).classList.add('active');
    }

    function render() {
      const result = runCalculations(STATE.answers);
      renderNav();
      renderSummary(result);
      renderReport(result);
      renderEcosystem(result);
      renderGrowth(result);
      showSection();
      wireGlobalButtons(result);
    }

    // Start with a demo state if empty
    if (Object.keys(STATE.answers).length === 0) {
      STATE.answers = generateDemoAnswers('F-R-S');
      saveState();
    }
    render();
  </script>
</body>
</html>
