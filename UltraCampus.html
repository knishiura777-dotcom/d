<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ULTRA CAMPUS: LEGEND SIMULATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-blur: 10px;
            --panel-radius: 2.5rem;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow-x: hidden;
            background-color: #020617;
        }

        body {
            min-height: 100svh;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        .glass {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.16; transform: scale(1); }
            50% { opacity: 0.24; transform: scale(1.04); }
        }

        .animate-pulse-slow {
            animation: pulse-slow 10s infinite ease-in-out;
        }

        .transition-screen {
            transition: opacity 0.24s ease, transform 0.24s ease;
        }

        .app-shell {
            width: 100%;
            max-width: 36rem;
            margin: 0 auto;
        }

        .mobile-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 1.25rem;
            padding: 1rem 1rem 1rem 3.5rem;
            font-size: 1.125rem;
            line-height: 1.5;
            color: #fff;
            font-weight: 700;
            text-align: left;
            outline: none;
            box-shadow: none;
            transition: border-color 0.18s ease, background-color 0.18s ease;
            appearance: none;
            -webkit-appearance: none;
        }

        .mobile-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 700;
        }

        .mobile-input:focus {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.32);
        }

        .action-button {
            transition: transform 0.18s ease, background-color 0.18s ease, color 0.18s ease;
        }

        .action-button:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px), (hover: none) and (pointer: coarse) {
            :root {
                --glass-bg: rgba(255, 255, 255, 0.07);
                --glass-border: rgba(255, 255, 255, 0.08);
                --glass-blur: 0px;
                --panel-radius: 2rem;
            }

            body {
                padding: max(1rem, env(safe-area-inset-top)) 0.75rem max(1rem, env(safe-area-inset-bottom));
            }

            .animate-pulse-slow,
            .mobile-disable-anim {
                animation: none !important;
            }

            .glass {
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }

            .bg-orb {
                filter: blur(72px) !important;
                opacity: 0.13 !important;
            }

            .hero-title {
                font-size: clamp(3rem, 13vw, 4.5rem) !important;
            }

            .panel-lg,
            .panel-md {
                border-radius: var(--panel-radius) !important;
            }

            .result-icon {
                font-size: 6rem !important;
            }

            .score-number {
                font-size: 5rem !important;
            }

            .history-scroll {
                max-height: none !important;
            }
        }
    </style>
</head>
<body class="relative">

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="bg-orb absolute top-[-12%] left-[-12%] w-[60%] h-[60%] bg-indigo-600/20 blur-[90px] animate-pulse-slow rounded-full"></div>
        <div class="bg-orb absolute bottom-[-12%] right-[-12%] w-[60%] h-[60%] bg-rose-600/12 blur-[90px] animate-pulse-slow rounded-full" style="animation-delay: 3s"></div>
    </div>

    <main class="relative z-10 min-h-[100svh] flex items-center justify-center px-3 py-4 sm:p-6">
        <div id="app" class="app-shell transition-screen"></div>
    </main>

    <script>
        let state = {
            screen: 'start',
            stats: { intelligence: 50, social: 50, stamina: 50, luck: 50 },
            year: 1,
            playerName: '',
            history: [],
            sessionQuestions: []
        };

        const questionPool = {
            1: [
                { title: "1限、絶望の朝", text: "目が覚めたら午前8時50分。授業開始まであと10分。君はどう動く？", choices: [
                    { text: "パジャマの上にコートで音速移動", effect: { stamina: 25, social: -15 }, comment: "見た目は不審者、中身は大学生。" },
                    { text: "『まだ夢の中だ』と二度寝をキメる", effect: { luck: 20, intelligence: -15 }, comment: "単位より睡眠という哲学を貫いた。" },
                    { text: "Zoomの背景を教室にして自宅参戦", effect: { intelligence: 20, luck: 10 }, comment: "対面授業なのに奇跡的にバレなかった。" }
                ]},
                { title: "サークル勧誘の罠", text: "怪しげな先輩に『全自動卵割りサークル』に誘われた。どう返事する？", choices: [
                    { text: "『卵側として入部したい』と志願", effect: { social: 30, luck: 5 }, comment: "覚悟が認められ、即日レギュラーに。" },
                    { text: "卵の構造について講釈を垂れる", effect: { intelligence: 25, social: -10 }, comment: "先輩が泣きながら逃げ出した。" },
                    { text: "卵を割らずに殻から脱出する手品", effect: { luck: 30, stamina: 5 }, comment: "手品研究会からスカウトが来た。" }
                ]},
                { title: "恐怖の学内Wi-Fi", text: "レポート提出直前。学内のWi-Fiが絶望的に遅い。どうする？", choices: [
                    { text: "ルーターの前で『祈りの舞』", effect: { luck: 40, stamina: 10 }, comment: "神がパケットを優先してくれた。" },
                    { text: "Wi-Fiの電波を素手で掴もうとする", effect: { stamina: 20, intelligence: -10 }, comment: "怪電波を受信する体質になった。" },
                    { text: "隣の学生のテザリングに念を送る", effect: { social: 15, luck: 15 }, comment: "パスワードを当てる奇跡が起きた。" }
                ]}
            ],
            2: [
                { title: "禁断の代返（だいへん）", text: "出席確認。欠席した友人の名前が呼ばれた。君の決断は？", choices: [
                    { text: "腹話術で3人分の声を出す", effect: { social: 25, intelligence: 10 }, comment: "声優としての才能が開花した。" },
                    { text: "教授の背後に回り込み自分で返事", effect: { stamina: 20, luck: 15 }, comment: "もはや物理攻撃に近い出席確認。" },
                    { text: "『彼は今、心の中にいます』", effect: { intelligence: 15, social: -10 }, comment: "宗教上の理由で却下された。" }
                ]},
                { title: "エナドリ中毒の夏", text: "試験前夜。カフェインの摂りすぎで壁と会話できるようになった。", choices: [
                    { text: "壁から過去問の答えを聞き出す", effect: { intelligence: 35, luck: -20 }, comment: "壁『3番はCだ...』" },
                    { text: "心臓の鼓動でBPM180の曲を作る", effect: { stamina: 30, social: 10 }, comment: "ダンス部が踊り狂い始めた。" },
                    { text: "瞳孔全開で教授を威嚇する", effect: { stamina: 20, social: -15 }, comment: "『元気だね』と単位を貰った。" }
                ]}
            ],
            3: [
                { title: "意識高い系インターン", text: "インターン先で『君のバリューは何？』と聞かれた。どう答える？", choices: [
                    { text: "『光合成ができます』", effect: { social: 30, luck: 10 }, comment: "エコすぎる人材として採用された。" },
                    { text: "『不眠不休でタイピング可能です』", effect: { stamina: 30, intelligence: -10 }, comment: "人間を辞めた働きぶりを評価された。" },
                    { text: "無言でMacBookのロゴを指さす", effect: { intelligence: 10, social: 15 }, comment: "『何か深い』と勘違いされた。" }
                ]},
                { title: "学食の裏メニュー", text: "『単位確定丼』という1万円のメニューを発見。注文する？", choices: [
                    { text: "バイト代を全て注ぎ込む", effect: { luck: 40, stamina: -20 }, comment: "財布は空だが、単位は腹に詰まった。" },
                    { text: "自分で具材（参考書）を持ち込む", effect: { intelligence: 30, social: -10 }, comment: "知識の味は紙の味がした。" },
                    { text: "丼の器になって厨房に潜入", effect: { social: 25, stamina: 10 }, comment: "学食のおばちゃんとマブダチに。" }
                ]}
            ],
            4: [
                { title: "卒論の怪奇現象", text: "保存したはずのファイル名が『あああああ.docx』に変わっている。どうする？", choices: [
                    { text: "『あああああ』を正式題名にする", effect: { luck: 50, intelligence: -20 }, comment: "ポストモダン文学の頂点に立った。" },
                    { text: "PCに御札を貼って祈祷する", effect: { luck: 40, stamina: -10 }, comment: "ITと呪術の融合。奇跡的に復旧。" },
                    { text: "1分間で1万文字リライトする", effect: { stamina: 40, intelligence: 10 }, comment: "キーボードから火花が出た。" }
                ]},
                { title: "最後の卒業式", text: "卒業式当日。どんなパフォーマンスで締めくくる？", choices: [
                    { text: "逆立ちで卒業証書を受け取る", effect: { stamina: 35, social: 10 }, comment: "世界が逆さまに見える門出。" },
                    { text: "スモークとレーザーで入場", effect: { social: 40, luck: -10 }, comment: "学長より目立って出禁になった。" },
                    { text: "透明人間になって静かに去る", effect: { intelligence: 20, luck: 20 }, comment: "伝説の存在として語り継がれた。" }
                ]}
            ]
        };

        function updateUI() {
            const app = document.getElementById('app');
            app.innerHTML = '';

            if (state.screen === 'start') {
                app.innerHTML = `
                    <div class="text-center space-y-8 sm:space-y-12 px-1 sm:px-0">
                        <div class="relative inline-block group">
                            <div class="absolute inset-0 bg-white/20 blur-[36px] rounded-full scale-125 mobile-disable-anim"></div>
                            <div class="glass panel-lg p-8 sm:p-14 rounded-[3rem] sm:rounded-[5rem] relative transition-transform sm:group-hover:scale-105">
                                <i data-lucide="graduation-cap" class="w-20 h-20 sm:w-32 sm:h-32 mx-auto text-white"></i>
                            </div>
                        </div>
                        <div class="space-y-4 sm:space-y-6">
                            <h1 class="hero-title text-5xl sm:text-7xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white via-white/70 to-transparent leading-[0.9]">
                                ULTRA<br>CAMPUS
                            </h1>
                            <p class="text-indigo-400 font-black tracking-[0.35em] sm:tracking-[0.6em] text-xs sm:text-sm uppercase opacity-90">Simulation Infinite</p>
                        </div>
                        <div class="space-y-4 sm:space-y-5 px-1 sm:px-8">
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-5 top-1/2 -translate-y-1/2 text-white/40 w-5 h-5"></i>
                                <input
                                    type="text"
                                    id="playerNameInput"
                                    value="${escapeHtml(state.playerName)}"
                                    placeholder="名前を入力"
                                    autocapitalize="off"
                                    autocorrect="off"
                                    autocomplete="nickname"
                                    spellcheck="false"
                                    enterkeyhint="done"
                                    maxlength="24"
                                    class="mobile-input"
                                >
                            </div>
                            <button onclick="startGame()" id="startBtn" class="action-button w-full bg-white text-black font-black py-5 sm:py-7 rounded-[1.6rem] sm:rounded-[3rem] text-xl sm:text-3xl shadow-xl flex items-center justify-center gap-3 sm:gap-5">
                                <i data-lucide="dice-5" class="w-5 h-5 sm:w-6 sm:h-6"></i>運命を生成
                            </button>
                        </div>
                    </div>
                `;

                const input = document.getElementById('playerNameInput');
                input.addEventListener('input', (e) => {
                    state.playerName = e.target.value;
                }, { passive: true });
            } else if (state.screen === 'game') {
                const q = state.sessionQuestions[state.year - 1];
                app.innerHTML = `
                    <div class="space-y-5 sm:space-y-10 px-1 sm:px-0 pb-3">
                        <div class="glass panel-lg rounded-[2rem] sm:rounded-[4rem] p-6 sm:p-12 shadow-2xl relative overflow-hidden">
                            <div class="flex justify-between items-center mb-7 sm:mb-10">
                                <div class="space-y-1">
                                    <div class="flex items-center gap-3 mb-2">
                                        <span class="w-2.5 h-2.5 rounded-full bg-indigo-500"></span>
                                        <p class="text-[10px] sm:text-xs font-black text-indigo-400 uppercase tracking-[0.28em] sm:tracking-[0.4em]">Year 0${state.year}</p>
                                    </div>
                                    <h2 class="text-3xl sm:text-5xl font-black text-white leading-tight tracking-tighter">${q.title}</h2>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 sm:gap-6">
                                ${renderStat('brain', state.stats.intelligence, 'bg-blue-400')}
                                ${renderStat('heart', state.stats.social, 'bg-rose-400')}
                                ${renderStat('zap', state.stats.stamina, 'bg-amber-400')}
                                ${renderStat('sparkles', state.stats.luck, 'bg-fuchsia-400')}
                            </div>
                        </div>
                        <div class="glass panel-md rounded-[2rem] sm:rounded-[4rem] p-6 sm:p-12 shadow-2xl">
                            <p class="text-xl sm:text-3xl font-medium leading-[1.45] sm:leading-[1.3] mb-7 sm:mb-12 text-white/95 tracking-tight">${q.text}</p>
                            <div class="space-y-3 sm:space-y-5">
                                ${q.choices.map((c, i) => `
                                    <button onclick="makeChoice(${i})" class="action-button w-full group flex items-center justify-between bg-white/6 sm:hover:bg-white text-white/85 sm:hover:text-black px-5 sm:px-10 py-5 sm:py-8 rounded-[1.4rem] sm:rounded-[2.5rem] border border-white/10">
                                        <span class="font-black text-lg sm:text-2xl text-left leading-tight pr-4 sm:pr-6">${c.text}</span>
                                        <i data-lucide="chevron-right" class="hidden sm:block opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'result') {
                const total = state.stats.intelligence + state.stats.social + state.stats.stamina + state.stats.luck;
                const rank = getRank(total);
                const ending = getEnding();
                app.innerHTML = `
                    <div class="history-scroll space-y-5 sm:space-y-10 max-h-[85vh] overflow-y-auto no-scrollbar pb-10 sm:pb-16 px-1 sm:px-4">
                        <div class="glass panel-lg rounded-[2.5rem] sm:rounded-[5rem] p-8 sm:p-16 text-center space-y-8 sm:space-y-12 relative overflow-hidden">
                            <div class="result-icon text-[6rem] sm:text-[160px] leading-none">${ending.icon}</div>
                            <div class="space-y-4 sm:space-y-6">
                                <p class="text-indigo-400 font-black tracking-[0.45em] sm:tracking-[0.8em] text-[10px] sm:text-xs uppercase italic">Simulation Result</p>
                                <h3 class="text-4xl sm:text-7xl font-black tracking-tighter leading-none text-white">${ending.title}</h3>
                                <p class="text-lg sm:text-2xl text-white/60 font-medium px-1 sm:px-6 leading-relaxed">${ending.desc}</p>
                            </div>
                            <div class="pt-2 sm:pt-6">
                                <div class="relative inline-flex flex-col items-center">
                                    <div class="absolute inset-0 bg-gradient-to-br ${rank.color} blur-[72px] opacity-35"></div>
                                    <div class="relative p-8 sm:p-14 glass rounded-[2rem] sm:rounded-[4rem] shadow-2xl">
                                        <p class="text-[10px] sm:text-xs font-black text-white/40 uppercase tracking-[0.35em] sm:tracking-[0.6em] mb-3 sm:mb-4">Evolution Index</p>
                                        <p class="score-number text-[5rem] sm:text-[10rem] font-black tracking-tighter text-white tabular-nums leading-[0.85] mb-6 sm:mb-10">${total}</p>
                                        <div class="px-6 sm:px-12 py-4 sm:py-5 rounded-[1.4rem] sm:rounded-[2.5rem] font-black text-sm sm:text-xl uppercase tracking-[0.28em] sm:tracking-[0.4em] bg-gradient-to-r ${rank.color} text-white shadow-2xl">
                                            RANK: ${rank.label.split(':')[0]}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="glass panel-md rounded-[2rem] sm:rounded-[4rem] p-6 sm:p-12 space-y-8 sm:space-y-12">
                            <h4 class="text-[10px] sm:text-xs font-black text-white/40 uppercase tracking-[0.32em] sm:tracking-[0.5em] flex items-center gap-3 sm:gap-4">
                                <i data-lucide="activity" class="text-indigo-500 w-4 h-4 sm:w-5 sm:h-5"></i> Life Memory Archive
                            </h4>
                            <div class="space-y-7 sm:space-y-12">
                                ${state.history.map((h, i) => `
                                    <div class="flex gap-4 sm:gap-10 items-start relative group">
                                        <div class="bg-white text-black h-12 w-12 sm:h-16 sm:w-16 rounded-[1rem] sm:rounded-[1.5rem] flex items-center justify-center shrink-0 text-lg sm:text-2xl font-black shadow-2xl">${i + 1}</div>
                                        <div class="space-y-2 sm:space-y-3 pt-1 sm:pt-2">
                                            <p class="text-[10px] sm:text-xs text-indigo-400 font-black uppercase tracking-[0.28em] sm:tracking-widest">${h.title}</p>
                                            <p class="text-lg sm:text-2xl text-white/90 leading-snug font-bold italic">『${h.comment}』</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <button onclick="resetGame()" class="action-button w-full glass sm:hover:bg-white text-white/70 sm:hover:text-black font-black py-6 sm:py-10 rounded-[2rem] sm:rounded-[4rem] flex items-center justify-center gap-4 sm:gap-6 text-xl sm:text-3xl shadow-xl">
                            <i data-lucide="refresh-cw" class="w-5 h-5 sm:w-6 sm:h-6"></i>新しい宇宙を生成
                        </button>
                    </div>
                `;
            }

            if (window.lucide && typeof lucide.createIcons === 'function') {
                lucide.createIcons();
            }
        }

        function renderStat(icon, val, color) {
            return `
                <div class="bg-white/5 rounded-[1.2rem] sm:rounded-[2rem] p-4 sm:p-6 border border-white/10 flex flex-col gap-3 sm:gap-4">
                    <div class="flex justify-between items-center">
                        <i data-lucide="${icon}" class="text-white/50 w-5 h-5 sm:w-6 sm:h-6"></i>
                        <span class="text-lg sm:text-xl font-mono font-black text-white">${val}</span>
                    </div>
                    <div class="h-2.5 bg-black/40 rounded-full overflow-hidden">
                        <div class="h-full ${color} transition-[width] duration-500 ease-out" style="width: ${val}%"></div>
                    </div>
                </div>
            `;
        }

        function startGame() {
            const trimmedName = state.playerName.trim();
            if (!trimmedName) return;
            state.playerName = trimmedName;

            const selected = [];
            for (let i = 1; i <= 4; i++) {
                const pool = questionPool[i];
                selected.push(pool[Math.floor(Math.random() * pool.length)]);
            }
            state.sessionQuestions = selected;
            transitionTo('game');
        }

        function makeChoice(idx) {
            const choice = state.sessionQuestions[state.year - 1].choices[idx];
            Object.keys(choice.effect).forEach(key => {
                state.stats[key] = Math.max(0, Math.min(100, state.stats[key] + choice.effect[key]));
            });
            state.history.push({ title: state.sessionQuestions[state.year - 1].title, comment: choice.comment });

            if (state.year < 4) {
                state.year++;
                transitionTo('game');
            } else {
                transitionTo('result');
            }
        }

        function transitionTo(nextScreen) {
            const app = document.getElementById('app');
            app.style.opacity = '0';
            app.style.transform = 'translateY(-10px) scale(0.985)';
            setTimeout(() => {
                state.screen = nextScreen;
                updateUI();
                requestAnimationFrame(() => {
                    app.style.opacity = '1';
                    app.style.transform = 'translateY(0) scale(1)';
                });
            }, 180);
        }

        function resetGame() {
            state = {
                screen: 'start',
                stats: { intelligence: 50, social: 50, stamina: 50, luck: 50 },
                year: 1,
                playerName: '',
                history: [],
                sessionQuestions: []
            };
            updateUI();
            const app = document.getElementById('app');
            app.style.opacity = '1';
            app.style.transform = 'translateY(0) scale(1)';
        }

        function getRank(total) {
            if (total >= 340) return { label: "SSS: 宇宙の真理", color: "from-rose-600 to-amber-500" };
            if (total >= 290) return { label: "S: キャンパスの守護神", color: "from-yellow-400 to-orange-600" };
            if (total >= 230) return { label: "A: 逸材エリート", color: "from-cyan-500 to-blue-600" };
            if (total >= 170) return { label: "B: 普通に楽しい大学生", color: "from-emerald-400 to-teal-600" };
            return { label: "C: 奇跡の卒業生", color: "from-slate-400 to-slate-600" };
        }

        function getEnding() {
            const { intelligence, social, stamina, luck } = state.stats;
            if (intelligence > 95) return { title: "生ける百科事典", icon: "🧠", desc: "知性が高まりすぎて、瞬きするだけで論文が1本完成します。" };
            if (social > 95) return { title: "全人類の友", icon: "🤝", desc: "街を歩くと見知らぬ人から感謝状が届き、世界平和を成し遂げました。" };
            if (luck > 95) return { title: "確率操作の達人", icon: "🌌", desc: "テストの名前を書き忘れても、教授が気を利かせて100点にしてくれます。" };
            if (stamina > 95) return { title: "歩く重機", icon: "🏗️", desc: "大学の校舎を丸ごと持ち上げて引越しさせ、地域に貢献しました。" };
            return { title: "無限の可能性を持つ若者", icon: "✨", desc: "あらゆる能力を使いこなし、社会という名のキャンパスへ羽ばたきます。" };
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        window.addEventListener('load', updateUI, { once: true });
    </script>
