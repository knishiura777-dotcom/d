<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆笑かけ算100階層：本格RPGエディション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;900&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            user-select: none;
            overflow-x: hidden;
        }

        .font-rpg {
            font-family: 'DotGothic16', sans-serif;
        }

        .hp-gradient {
            background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);
        }

        .mp-gradient {
            background: linear-gradient(90deg, #4f46e5 0%, #818cf8 100%);
        }

        .monster-hp-gradient {
            background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
        }

        .boss-hp-gradient {
            background: linear-gradient(90deg, #dc2626 0%, #f87171 100%);
        }

        @keyframes bounce-custom {
            0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
            50% { transform: translateY(-20px) rotate(var(--rot, 0deg)); }
        }

        .animate-monster {
            animation: bounce-custom 3s infinite ease-in-out;
            filter: var(--filter, none);
        }

        .pop-animation {
            animation: pop-float 0.8s forwards ease-out;
        }

        @keyframes pop-float {
            0% { opacity: 1; transform: translateY(0) scale(1.5); }
            100% { opacity: 0; transform: translateY(-80px) scale(1); }
        }

        .shake {
            animation: shake-anim 0.4s;
        }

        @keyframes shake-anim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .glow-active {
            text-shadow: 0 0 15px rgba(96, 165, 250, 0.8);
            transform: scale(1.1);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-correct {
            border-color: #10b981 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        .input-wrong {
            border-color: #ef4444 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry {
            animation: logIn 0.3s ease-out forwards;
        }
        @keyframes logIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="max-w-2xl mx-auto p-4 md:p-8 flex flex-col min-h-screen">
        <div class="flex items-center justify-center h-full text-indigo-400 font-black animate-pulse">ADVENTURE LOADING...</div>
    </div>

    <script>
        const BASE_LIMIT_TIME = 20;

        const MONSTER_PARTS = {
            isekai: {
                prefixes: ["働きたくない", "絶賛反抗期の", "腰痛持ちの", "就活中の", "ダイエットに失敗した", "中二病が治らない", "定時で帰りたい", "野菜嫌いの", "二度寝の達人", "実家暮らしの", "実は小心者の", "有給申請中の", "SNS映えを気にする", "親フラが怖い", "課金が止まらない", "レベル1のままの", "履歴書を忘れた", "メンタル豆腐な", "勇者に憧れる", "自称最強の", "おやつを盗まれた"],
                names: ["スライム", "ドラゴン", "魔王の息子", "オーク", "ガイコツ", "魔導士", "ゴーレム", "ケルベロス", "死神", "グリフォン", "ミミック", "キメラ", "ガーゴイル", "ゴブリン", "ワイバーン", "スケルトンナイト"],
                scenarios: ["「有給休暇ってどこでもらえるの？」", "「あー、ゲームやりたい。」", "「最近、野菜しか食べてないんだ...」", "「100階まで階段とか無理すぎ。」", "「魔王様、怒ると怖いんだよ？」", "「履歴書に何書けばいいかな...」", "「攻撃？明日から本気出すわ。」", "「昨日の夜更かしが響いてる...」", "「あ、今Wi-Fi切れました？」", "「レベル上げとか面倒じゃない？」"],
                emojis: ["💧", "🐲", "👹", "🐷", "💀", "🧙", "📦", "🐕", "✨", "🦅", "🗃️", "🐾", "🗿", "👺", "🐉", "🧟"]
            },
            real: {
                prefixes: ["片方ない", "賞味期限切れの", "お風呂に入りたくない", "出しっぱなしの", "テスト直前の", "通知が止まらない", "電池残量1%の", "絶妙に冷めた", "絡まって解けない", "名前を書かれなかった", "洗濯機に食べられた", "半分溶けた", "掃除機から逃げた", "ホコリを被った", "月曜日の朝の", "寝ぐせが激しい", "半額シール付きの", "ランドセルに入りっぱなしの", "お母さんに見つかった"],
                names: ["靴下お化け", "納豆の怨霊", "ランドセル", "スマホ", "ポテトチップス", "宿題ノート", "自動ドアのセンサー", "イヤホン", "給食の白衣", "エアコンのリモコン", "コンパスの針", "消しゴムのカス", "半分開いたジャム瓶", "ぬるいコーラ", "切れた電球", "穴のあいた上履き", "三角定規", "半分に折れた鉛筆"],
                scenarios: ["「どこに隠れたか当ててみてー！」", "「通知音で眠らせないぞ！」", "「宿題？明日やるって言ったじゃん。」", "「掃除しようとするとやる気吸い取るよ。」", "「お母さんの足音、聞こえる...？」", "「私の片割れ、洗濯機の裏にいるよ。」", "「もう電池がもたない...さらば...」", "「今、いいところだったのに！」", "「洗われるのだけは勘弁して！」"],
                emojis: ["🧦", "🍱", "🎒", "📱", "🥔", "📝", "🚪", "🎧", "🧥", "🎮", "📍", "☁️", "🏺", "🍹", "💡", "👟", "📐", "✏️"]
            }
        };

        const STORIES = {
            isekai: {
                id: 'isekai',
                name: '異世界ストーリー',
                description: '魔力の干渉で時間が速い！【20秒制限】の本格バトル。',
                color: 'bg-indigo-600',
                hasTimer: true,
                icon: 'wand-2',
                destinations: [
                    { name: '冒険者ギルド', icon: 'building-2', color: 'text-yellow-500', msg: 'ギルドの受付で爆笑して目が覚めた。冒険は終了だ。' },
                    { name: '街の宿屋', icon: 'bed', color: 'text-blue-400', msg: '宿屋のベッドに運び込まれた。もう戦えない。' },
                    { name: '古びた教会', icon: 'church', color: 'text-slate-400', msg: '教会の神父さんに怒られて修行し直し。' }
                ],
                items: {
                    p1: { id: 'p1', name: '回復ポーション', icon: 'heart', cost: 10, desc: 'HPを30回復', type: 'active' },
                    p2: { id: 'p2', name: '攻略の巻物', icon: 'scroll', cost: 20, desc: 'ヒントを表示', type: 'active' },
                    p3: { id: 'p3', name: '聖なる爆弾', icon: 'zap', cost: 40, desc: '敵を一撃撃破', type: 'active' },
                    m1: { id: 'm1', name: '幸運のダイス', icon: 'dice-5', cost: 0, desc: '攻撃時、20%でダメージ2倍', type: 'mystery' },
                    m2: { id: 'm2', name: '伝説のギャグノート', icon: 'book-open', cost: 0, desc: 'フロア開始時、敵HPを10%削る', type: 'mystery' },
                    m3: { id: 'm3', name: '不思議な時計', icon: 'clock', cost: 0, desc: '制限時間を5秒延長', type: 'mystery' }
                }
            },
            real: {
                id: 'real',
                name: '現実世界ストーリー',
                description: '時間は平常。【制限時間なし】でじっくり計算できる。',
                color: 'bg-emerald-600',
                hasTimer: false,
                icon: 'home',
                destinations: [
                    { name: '近くの病院', icon: 'building-2', color: 'text-red-500', msg: '笑いすぎて病院へ。診察結果：かけ算不足。' },
                    { name: '放課後の学校', icon: 'school', color: 'text-slate-600', msg: '廊下で立たされていた。算数の時間の夢か。' },
                    { name: '自分の部屋', icon: 'door-open', color: 'text-amber-600', msg: '自分の部屋。お母さんに怒られて終了。' }
                ],
                items: {
                    p1: { id: 'p1', name: '元気ドリンク', icon: 'heart', cost: 10, desc: 'HPを30回復', type: 'active' },
                    p2: { id: 'p2', name: '攻略メモ', icon: 'scroll', cost: 20, desc: 'ヒントを表示', type: 'active' },
                    p3: { id: 'p3', name: '一発解決スプレー', icon: 'zap', cost: 40, desc: '敵を一撃解決', type: 'active' },
                    m1: { id: 'm1', name: '金の招き猫', icon: 'cat', cost: 0, desc: '計算成功時、MP回復量が2倍', type: 'mystery' },
                    m2: { id: 'm2', name: '謎のボタン', icon: 'box', cost: 0, desc: '使用すると何かが起きる', type: 'mystery' },
                    m3: { id: 'm3', name: '四次元ポケット', icon: 'bag', cost: 0, desc: 'アイテム所持上限がアップ', type: 'mystery' }
                }
            }
        };

        const FUNNY_ATTACKS = ["バナナの皮スリップ", "全力の空耳アタック", "お母さんの激怒", "期限切れの牛乳", "猫の肉球100連打", "全力のダジャレ", "寝ぐせビーム", "靴下紛失の呪い", "自動ドアに無視される", "Wi-Fi微弱の刑", "静電気パルス", "シャンプーが目に入る", "足のしびれアタック", "全力の変顔"];

        // --- 状態管理 ---
        var state = {
            gameState: 'start',
            storyType: null,
            floor: 1,
            playerHp: 100,
            playerMaxHp: 100,
            playerMp: 50,
            playerMaxMp: 50,
            inventory: { p1: 1, p2: 1, p3: 0, m1: 0, m2: 0, m3: 0 },
            currentQuestion: null,
            monsterHp: 0,
            monsterMaxHp: 0,
            userAnswer: '',
            feedback: null,
            showHint: false,
            timeLeft: BASE_LIMIT_TIME,
            lastAttack: '',
            popText: null, 
            popType: null, 
            loot: null,
            teleportDest: null,
            isShaking: false,
            isInputActive: false,
            battleLogs: [],
            isInventoryOpen: false
        };

        var timerInterval = null;

        function addLog(msg, type = 'info') {
            state.battleLogs.unshift({ msg, type });
            if (state.battleLogs.length > 3) state.battleLogs.pop();
        }

        function generateQuestion(floor, storyType, keepMonster = false) {
            if (!storyType) return;
            const isBoss = floor % 10 === 0;
            const parts = MONSTER_PARTS[storyType];
            
            const prefix = parts.prefixes[Math.floor(Math.random() * parts.prefixes.length)];
            const name = parts.names[Math.floor(Math.random() * parts.names.length)];
            const emoji = parts.emojis[Math.floor(Math.random() * parts.emojis.length)];
            const scenario = parts.scenarios[Math.floor(Math.random() * parts.scenarios.length)];
            
            // 見た目のランダム化（回転、サイズ、色調フィルター）
            const rotation = (Math.random() * 60 - 30).toFixed(0);
            const scale = (Math.random() * 0.5 + 0.7).toFixed(2);
            const hue = Math.floor(Math.random() * 360);
            const contrast = (Math.random() * 50 + 80).toFixed(0);
            const filter = `hue-rotate(${hue}deg) contrast(${contrast}%)`;

            let num1, num2;
            if (floor === 100) { num1 = 12; num2 = 12; }
            else if (isBoss) { num1 = Math.floor(Math.random() * 4) + 6; num2 = Math.floor(Math.random() * 4) + 6; }
            else { num1 = Math.floor(Math.random() * 8) + 2; num2 = Math.floor(Math.random() * 8) + 2; }

            state.currentQuestion = {
                monster: isBoss ? `【巨頭】${prefix}${name}` : `${prefix}${name}`,
                scenario: scenario,
                question: "攻撃力を計算せよ！",
                hint: `${num1} が ${num2} 個分あると考えると...？`,
                emoji: emoji,
                num1: num1,
                num2: num2,
                visual: { rotation, scale, filter }
            };

            if (!keepMonster) {
                const base = num1 * num2;
                const hp = isBoss ? base * 4 : base;
                state.monsterHp = hp;
                state.monsterMaxHp = hp;
                state.battleLogs = [];
                addLog(`${state.currentQuestion.monster}が現れた！`);
                if (state.inventory.m2 > 0) {
                    const bonusDmg = Math.floor(state.monsterHp * 0.1);
                    state.monsterHp -= bonusDmg;
                    addLog(`【ノート発動】先制攻撃で${bonusDmg}ダメージ！`, 'mystery');
                }
            }
            
            state.gameState = 'quiz';
            state.feedback = null;
            state.userAnswer = '';
            let limit = BASE_LIMIT_TIME;
            if (state.inventory.m3 > 0 && STORIES[storyType].hasTimer) limit += 5;
            state.timeLeft = limit;
            state.popText = null;
            state.lastAttack = '';
            state.showHint = floor <= 5;
            state.loot = null;
            state.isInputActive = false;
            state.isInventoryOpen = false;

            startTimer();
            render();
        }

        function startTimer() {
            stopTimer();
            if (!state.storyType || !STORIES[state.storyType].hasTimer) return;
            timerInterval = setInterval(() => {
                state.timeLeft--;
                updateTimerUI(); // 画面全体ではなくバーだけを更新する
                if (state.timeLeft <= 0) {
                    stopTimer();
                    handleLoss("時間切れ！モンスターの不意打ちをくらった！");
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        // タイマー専用のUI更新関数
        function updateTimerUI() {
            const bar = document.getElementById('timer-bar');
            if (bar) {
                const max = BASE_LIMIT_TIME + (state.inventory.m3 > 0 ? 5 : 0);
                const percent = (state.timeLeft / max) * 100;
                bar.style.width = `${percent}%`;
                bar.className = `h-full transition-all duration-1000 ease-linear ${state.timeLeft > 10 ? 'bg-indigo-500' : 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]'}`;
            }
        }

        function triggerShake() {
            state.isShaking = true;
            render();
            setTimeout(() => {
                state.isShaking = false;
                render();
            }, 400);
        }

        function handleAnswer(ans) {
            if (state.feedback || !ans) return;
            const correct = state.currentQuestion.num1 * state.currentQuestion.num2;
            let inputVal = parseInt(ans);

            if (inputVal === correct) {
                stopTimer();
                const attack = FUNNY_ATTACKS[Math.floor(Math.random() * FUNNY_ATTACKS.length)];
                state.lastAttack = attack;
                let finalDmg = inputVal;
                if (state.inventory.m1 > 0 && Math.random() < 0.2) {
                    finalDmg *= 2;
                    addLog(`【ダイス発動】ダメージ2倍！`, 'mystery');
                }
                state.popText = `-${finalDmg}`;
                state.popType = 'damage';
                state.monsterHp = Math.max(0, state.monsterHp - finalDmg);
                let mpGain = 5;
                if (state.inventory.m1 > 0 && state.storyType === 'real') mpGain *= 2;
                state.playerMp = Math.min(state.playerMaxMp, state.playerMp + mpGain);

                if (state.monsterHp <= 0) handleWin();
                else {
                    state.feedback = { isCorrect: true, isPartial: true, message: `${attack}！ ${finalDmg}ダメージ！`, explanation: `耐えられている...。` };
                    render();
                }
            } else {
                state.popText = "MISS!";
                state.popType = 'miss';
                triggerShake();
                handleLoss();
            }
        }

        function handleWin() {
            const isBoss = state.floor % 10 === 0;
            if (Math.random() < 0.4 || isBoss) {
                const pool = Math.random() < 0.3 ? ['m1', 'm2', 'm3'] : ['p1', 'p2', 'p3'];
                state.loot = pool[Math.floor(Math.random() * 3)];
                state.inventory[state.loot]++;
                addLog(`「${STORIES[state.storyType].items[state.loot].name}」を入手！`);
            }
            state.feedback = { isCorrect: true, isPartial: false, message: state.floor === 100 ? '🎉 大魔王を笑い死にさせた！' : '⚔️ 敵を笑いで浄化した！', explanation: `かけ算は世界の理だ。` };
            render();
        }

        function handleLoss(msg) {
            stopTimer();
            state.playerHp = Math.max(0, state.playerHp - 25);
            addLog(`25ダメージ！ 残りHP:${state.playerHp}`, 'danger');
            if (state.playerHp <= 0) {
                const dests = STORIES[state.storyType].destinations;
                state.teleportDest = dests[Math.floor(Math.random() * dests.length)];
                state.feedback = { isCorrect: false, message: '力尽きた...', explanation: `正解は ${state.currentQuestion.num1 * state.currentQuestion.num2}。` };
                render();
                setTimeout(() => { state.gameState = 'gameOver'; render(); }, 2000);
            } else {
                state.feedback = { isCorrect: false, message: msg || 'ギャグがすべってダメージ！', explanation: `正解は ${state.currentQuestion.num1 * state.currentQuestion.num2}。` };
                render();
            }
        }

        function useItem(id) {
            const item = STORIES[state.storyType].items[id];
            if (state.inventory[id] <= 0 || (item.cost > 0 && state.playerMp < item.cost) || state.feedback || state.gameState !== 'quiz') return;
            state.inventory[id]--;
            state.playerMp -= item.cost;
            if (id === 'p1') { state.playerHp = Math.min(state.playerMaxHp, state.playerHp + 30); addLog("HPを30回復した！"); }
            else if (id === 'p2') { state.showHint = true; addLog("ヒントを解読！"); }
            else if (id === 'p3') { state.monsterHp = 0; stopTimer(); handleWin(); }
            else if (id === 'm2' && state.storyType === 'real') {
                const rnd = Math.random();
                if (rnd < 0.4) { state.monsterHp = 0; handleWin(); }
                else if (rnd < 0.8) { state.playerMp = state.playerMaxMp; }
                else { state.playerHp -= 10; addLog("ボタンが爆発！", 'danger'); }
            }
            render();
        }

        function closeInventory() {
            state.isInventoryOpen = false;
            render();
            setTimeout(() => {
                const input = document.getElementById('ans-input');
                if (input) {
                    input.focus();
                    const val = input.value;
                    input.value = ''; input.value = val;
                }
            }, 100);
        }

        // --- 描画エンジン ---
        function render() {
            const app = document.getElementById('app');
            let template = '';
            const shakeClass = state.isShaking ? 'shake' : '';

            switch (state.gameState) {
                case 'start':
                    template = `
                        <div class="bg-slate-800 rounded-[2.5rem] p-10 text-center border-4 border-slate-700 shadow-2xl relative overflow-hidden fade-in">
                            <h1 class="text-4xl font-black mb-4 text-white font-rpg italic tracking-tighter underline decoration-indigo-500 underline-offset-8">爆笑かけ算100階層</h1>
                            <p class="text-slate-400 mb-8 leading-relaxed">300種のヘンテコ魔物を笑いで倒せ！<br>本格RPGシステム搭載のかけ算クエスト。</p>
                            <div class="bg-red-900/30 text-red-400 p-4 rounded-2xl flex items-center justify-center gap-2 mb-8 text-sm font-bold border border-red-800">
                                <i data-lucide="alert-triangle"></i> オフライン一発勝負！
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${Object.values(STORIES).map(s => `
                                    <button onclick="selectStory('${s.id}')" class="p-6 bg-slate-950/50 rounded-3xl border-2 border-slate-700 hover:border-indigo-500 transition-all text-left group">
                                        <div class="mb-3"><i data-lucide="${s.icon}" class="w-8 h-8 text-indigo-500"></i></div>
                                        <h3 class="font-black text-lg text-white mb-1">${s.name}</h3>
                                        <p class="text-[10px] text-slate-500 leading-tight">${s.description}</p>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    break;

                case 'selectMode':
                    const storyInfo = STORIES[state.storyType];
                    template = `
                        <div class="bg-slate-800 rounded-[2.5rem] p-10 text-center border-4 border-slate-700 shadow-2xl fade-in">
                            <div class="w-20 h-20 bg-slate-900 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl border border-slate-700">
                                <i data-lucide="${storyInfo.icon}" class="w-10 h-10 text-indigo-500"></i>
                            </div>
                            <h2 class="text-2xl font-black mb-2 text-white">${storyInfo.name}</h2>
                            <div class="bg-slate-950 p-6 rounded-3xl mb-8 border border-slate-700 shadow-inner text-left">
                                <p class="text-slate-400 text-sm leading-relaxed mb-4">
                                    ${storyInfo.hasTimer ? "異世界は時間の流れが加速中！20秒以内に答えて攻撃を放て。" : "現実の時間はゆったり。制限時間なし。落ち着いて確実に計算せよ。"}
                                </p>
                                <div class="bg-indigo-900/20 p-3 rounded-xl border border-indigo-500/20">
                                    <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Mystery Tip:</span>
                                    <p class="text-[10px] text-slate-500">謎のアイテムは持っているだけで効果を発揮するぞ。</p>
                                </div>
                            </div>
                            <button onclick="generateQuestion(state.floor, state.storyType)" class="w-full bg-indigo-600 text-white font-black py-5 rounded-3xl text-xl hover:bg-indigo-500 shadow-xl transition-all flex items-center justify-center gap-3 active:scale-95">
                                冒険を開始する！ <i data-lucide="play-circle"></i>
                            </button>
                        </div>
                    `;
                    break;

                case 'quiz':
                    const isBoss = state.floor % 10 === 0;
                    const story = STORIES[state.storyType];
                    const q = state.currentQuestion;
                    const visual = q.visual;
                    template = `
                        <div class="${shakeClass}">
                            <header class="w-full mb-4 bg-slate-800 p-4 rounded-2xl border-2 border-slate-700 shadow-2xl">
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center gap-3">
                                        <div class="p-2 bg-indigo-500 rounded-lg text-white shadow-lg"><i data-lucide="map"></i></div>
                                        <div><h2 class="font-black text-xl uppercase tracking-tighter">B${state.floor}F</h2></div>
                                    </div>
                                    <div class="flex gap-1 items-center bg-slate-900 px-3 py-1 rounded-full border border-slate-700">
                                        <i data-lucide="skull" class="${isBoss ? 'text-red-500 animate-pulse' : 'text-slate-600'}" size="14"></i>
                                        <span class="font-black text-[10px] ${isBoss ? 'text-red-500' : 'text-slate-500'} uppercase tracking-widest font-rpg">${isBoss ? 'BOSS' : 'NORMAL'}</span>
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <div class="flex justify-between items-end">
                                        <span class="text-[10px] font-black text-red-400 uppercase tracking-widest truncate max-w-[70%]">${q.monster}</span>
                                        <span class="text-[10px] font-mono font-bold text-slate-400">${state.monsterHp} / ${state.monsterMaxHp}</span>
                                    </div>
                                    <div class="h-3 w-full bg-slate-950 rounded-full border border-slate-700 p-0.5 shadow-inner">
                                        <div class="h-full rounded-full transition-all duration-700 ${isBoss ? 'boss-hp-gradient' : 'monster-hp-gradient'}" style="width: ${(state.monsterHp / state.monsterMaxHp) * 100}%"></div>
                                    </div>
                                </div>
                            </header>

                            <div class="mb-4 space-y-1 h-16 overflow-hidden">
                                ${state.battleLogs.map(log => `
                                    <div class="log-entry text-[10px] font-bold px-3 py-1 rounded-lg border flex items-center gap-2 ${
                                        log.type === 'mystery' ? 'bg-purple-900/30 border-purple-500/30 text-purple-300' : 
                                        log.type === 'danger' ? 'bg-red-900/30 border-red-500/30 text-red-300' : 
                                        'bg-slate-900/30 border-slate-500/30 text-slate-400'
                                    }">
                                        <i data-lucide="${log.type === 'mystery' ? 'sparkles' : 'info'}" size="10"></i> ${log.msg}
                                    </div>
                                `).join('')}
                            </div>

                            <div class="bg-slate-800 rounded-[2.5rem] shadow-2xl overflow-hidden border-2 border-slate-700 relative">
                                ${!state.feedback && story.hasTimer ? `
                                    <div class="h-2 w-full bg-slate-950 overflow-hidden">
                                        <div id="timer-bar" class="h-full transition-all duration-1000 ease-linear ${state.timeLeft > 10 ? 'bg-indigo-500' : 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]'}" style="width: ${(state.timeLeft / (BASE_LIMIT_TIME + (state.inventory.m3 > 0 ? 5 : 0))) * 100}%"></div>
                                    </div>
                                ` : ''}

                                <div class="p-8 md:p-10 text-center relative">
                                    <div class="relative inline-block mb-4">
                                        <div class="text-8xl animate-monster select-none drop-shadow-2xl" style="--rot: ${visual.rotation}deg; --filter: ${visual.filter}; transform: scale(${visual.scale});">
                                            ${q.emoji}
                                        </div>
                                        ${state.popText ? `
                                            <div class="absolute -top-6 -right-10 pop-animation font-black text-5xl italic ${state.popType === 'damage' ? 'text-red-500' : 'text-yellow-400'} z-20">
                                                ${state.popText}
                                            </div>
                                        ` : ''}
                                    </div>
                                    <h3 class="text-xl font-black text-white mb-1 uppercase tracking-tighter">${q.monster}</h3>
                                    <div class="bg-slate-900/50 p-2 rounded-xl mb-6 border border-slate-700/50 max-w-xs mx-auto">
                                        <p class="text-[10px] text-indigo-300 font-bold italic">「${q.scenario}」</p>
                                    </div>

                                    ${ (state.floor <= 5 || state.showHint) ? renderEmojiGroup(q.num1, q.num2, q.emoji, visual.filter) : '' }

                                    <div class="bg-slate-950 rounded-3xl p-6 mb-6 border-2 border-slate-700 shadow-inner">
                                        <div class="flex items-center justify-center gap-3 text-5xl font-mono">
                                            <span id="num1-disp" class="font-black transition-all text-slate-500">${q.num1}</span>
                                            <span class="text-slate-700 text-3xl font-rpg">×</span>
                                            <span id="num2-disp" class="font-black transition-all text-slate-500">${q.num2}</span>
                                            <span class="text-slate-700 text-3xl font-rpg">=</span>
                                            <form onsubmit="event.preventDefault(); handleAnswer(document.getElementById('ans-input').value);">
                                                <input id="ans-input" type="number" class="w-28 text-center bg-slate-900 border-4 border-slate-700 rounded-2xl py-2 font-black text-4xl text-indigo-400 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all shadow-md ${state.feedback ? (state.feedback.isCorrect ? 'input-correct' : 'input-wrong') : ''}" oninput="updateInputState(this.value)" autofocus ${state.feedback ? 'disabled' : ''} value="${state.userAnswer}" placeholder="?">
                                            </form>
                                        </div>
                                    </div>

                                    ${state.feedback ? `
                                        <div class="rounded-3xl p-6 mb-2 animate-in slide-in-from-top-4 ${state.feedback.isCorrect ? 'bg-indigo-900/40 border-indigo-700' : 'bg-red-900/40 border-red-700'} border text-left">
                                            <div class="flex items-center gap-4">
                                                <div class="p-4 rounded-2xl ${state.feedback.isCorrect ? 'bg-indigo-600' : 'bg-red-600'} text-white shadow-lg"><i data-lucide="${state.feedback.isCorrect ? 'trophy' : 'shield'}"></i></div>
                                                <div class="flex-grow">
                                                    <h4 class="font-black text-xl text-white italic">${state.feedback.message}</h4>
                                                    <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase">${state.feedback.explanation}</p>
                                                </div>
                                            </div>
                                            <button onclick="${state.feedback.isPartial ? 'generateQuestion(state.floor, state.storyType, true)' : 'nextFloor()'}" class="w-full mt-6 bg-white text-slate-950 font-black py-4 rounded-2xl flex items-center justify-center gap-2 shadow-xl hover:bg-slate-200 transition-all text-lg active:scale-95">
                                                ${state.feedback.isPartial ? 'CONTINUE ATTACK' : 'NEXT FLOOR'} <i data-lucide="arrow-right"></i>
                                            </button>
                                        </div>
                                    ` : `
                                        <div class="flex flex-col gap-3">
                                            <button onclick="handleAnswer(document.getElementById('ans-input').value)" class="w-full py-5 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xl shadow-xl transition-all flex items-center justify-center gap-3 active:scale-95">
                                                <i data-lucide="sword"></i> ATTACK NOW!
                                            </button>
                                            <div class="flex justify-center gap-4">
                                                <button onclick="state.showHint=true; render();" class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] flex items-center justify-center gap-1 hover:text-slate-300">ヒントを表示</button>
                                                <button onclick="state.isInventoryOpen=true; render();" class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.3em] flex items-center justify-center gap-1 hover:text-indigo-300"><i data-lucide="backpack" size="12"></i> 持ち物を確認</button>
                                            </div>
                                        </div>
                                    `}
                                </div>
                            </div>
                        </div>

                        <footer class="mt-4 bg-slate-800 p-6 rounded-3xl border-2 border-slate-700 shadow-2xl relative">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-4">
                                    <div>
                                        <div class="flex justify-between text-[10px] font-black mb-1"><span class="text-red-400 uppercase flex items-center gap-1 tracking-widest"><i data-lucide="heart" size="10" fill="currentColor"></i> PLAYER HP</span><span>${state.playerHp}/100</span></div>
                                        <div class="h-3 w-full bg-slate-950 rounded-full border border-slate-700 p-0.5 shadow-inner"><div class="h-full rounded-full hp-gradient transition-all duration-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]" style="width: ${state.playerHp}%"></div></div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-[10px] font-black mb-1"><span class="text-indigo-400 uppercase flex items-center gap-1 tracking-widest"><i data-lucide="zap" size="10" fill="currentColor"></i> MAGIC POWER</span><span>${state.playerMp}/50</span></div>
                                        <div class="h-3 w-full bg-slate-950 rounded-full border border-slate-700 p-0.5 shadow-inner"><div class="h-full rounded-full mp-gradient transition-all duration-500 shadow-[0_0_10px_rgba(79,70,229,0.3)]" style="width: ${(state.playerMp/50)*100}%"></div></div>
                                    </div>
                                </div>
                                <div class="flex items-center justify-end">
                                   <div class="grid grid-cols-6 gap-1">
                                      ${Object.entries(story.items).map(([id, item]) => `
                                          <button onclick="useItem('${id}')" class="relative ${state.inventory[id] > 0 ? '' : 'opacity-20 grayscale'}">
                                             <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg"><i data-lucide="${item.icon}" class="w-4 h-4 ${item.type === 'mystery' ? 'text-purple-400' : 'text-indigo-400'}"></i></div>
                                             ${state.inventory[id] > 0 ? `<span class="absolute -top-1 -right-1 bg-indigo-600 text-[8px] font-black px-1 rounded-full border border-slate-800">${state.inventory[id]}</span>` : ''}
                                          </button>
                                      `).join('')}
                                   </div>
                                </div>
                            </div>

                            <!-- インベントリモーダル -->
                            <div id="inventory-modal" class="${state.isInventoryOpen ? '' : 'hidden'} absolute inset-0 bg-slate-900/95 z-50 rounded-3xl p-6 border-2 border-indigo-500 shadow-2xl fade-in overflow-y-auto">
                                <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                                    <h3 class="font-black text-indigo-400 italic">ITEM COLLECTION</h3>
                                    <button onclick="closeInventory()"><i data-lucide="x" class="text-slate-500 hover:text-white"></i></button>
                                </div>
                                <div class="space-y-4">
                                    <div>
                                        <h4 class="text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Active Items</h4>
                                        <div class="grid gap-2 text-left">
                                            ${Object.entries(story.items).filter(([k,v]) => v.type === 'active').map(([id, item]) => `
                                                <div class="flex items-center gap-3 p-2 bg-slate-800 border border-slate-700 rounded-xl">
                                                    <div class="p-2 bg-slate-900 rounded-lg"><i data-lucide="${item.icon}" class="text-indigo-400 w-4 h-4"></i></div>
                                                    <div class="flex-grow">
                                                        <p class="text-xs font-black text-white">${item.name} (${state.inventory[id]})</p>
                                                        <p class="text-[8px] text-slate-500 uppercase">${item.desc}</p>
                                                    </div>
                                                    <button onclick="useItem('${id}')" class="px-3 py-1 bg-indigo-600 text-[10px] font-black rounded-lg ${state.inventory[id] > 0 && state.playerMp >= item.cost ? '' : 'opacity-20 pointer-events-none'}">MP ${item.cost}</button>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <div>
                                        <h4 class="text-[10px] font-black text-purple-400 mb-2 uppercase tracking-widest">Mystery (Passive)</h4>
                                        <div class="grid gap-2 text-left">
                                            ${Object.entries(story.items).filter(([k,v]) => v.type === 'mystery').map(([id, item]) => `
                                                <div class="flex items-center gap-3 p-2 bg-slate-800 border border-purple-500/30 rounded-xl ${state.inventory[id] > 0 ? 'opacity-100' : 'opacity-30'}">
                                                    <div class="p-2 bg-slate-900 rounded-lg"><i data-lucide="${item.icon}" class="text-purple-400 w-4 h-4"></i></div>
                                                    <div class="flex-grow">
                                                        <p class="text-xs font-black text-white">${item.name} (${state.inventory[id]})</p>
                                                        <p class="text-[8px] text-slate-500 uppercase">${item.desc}</p>
                                                    </div>
                                                    <span class="text-[8px] font-bold text-purple-400 italic px-2">AUTOMATIC</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </footer>
                    `;
                    break;

                case 'gameOver':
                    const dest = state.teleportDest;
                    template = `
                        <div class="bg-slate-950 text-white rounded-[2.5rem] p-12 text-center border-4 border-red-900 shadow-2xl relative fade-in">
                            <h2 class="text-4xl font-black mb-2 text-red-500 tracking-tighter uppercase italic">DEFEATED</h2>
                            <p class="text-slate-400 mb-6 font-bold uppercase tracking-widest text-[10px]">転送先: ${dest.name}</p>
                            <div class="bg-slate-900 p-6 rounded-3xl mb-8 border border-slate-800 italic text-slate-300 text-sm shadow-inner">「${dest.msg}」</div>
                            <button onclick="location.reload()" class="bg-white text-slate-950 font-black py-4 px-10 rounded-2xl flex items-center justify-center gap-2 mx-auto hover:bg-slate-200 shadow-xl transition-all">
                                <i data-lucide="rotate-ccw"></i> 最初からやり直す
                            </button>
                        </div>
                    `;
                    break;
            }

            app.innerHTML = template;
            lucide.createIcons();
            const input = document.getElementById('ans-input');
            if (input && !state.feedback && !state.isInventoryOpen) {
                input.focus();
                const val = input.value;
                input.value = ''; input.value = val;
            }
        }

        function updateInputState(val) {
            state.userAnswer = val;
            const n1 = document.getElementById('num1-disp');
            const n2 = document.getElementById('num2-disp');
            if (val) {
                n1.classList.add('glow-active', 'text-white'); n1.classList.remove('text-slate-500');
                n2.classList.add('glow-active', 'text-white'); n2.classList.remove('text-slate-500');
            } else {
                n1.classList.remove('glow-active', 'text-white'); n1.classList.add('text-slate-500');
                n2.classList.remove('glow-active', 'text-white'); n2.classList.add('text-slate-500');
            }
        }

        function renderEmojiGroup(num1, num2, emoji, filter) {
            let html = '<div class="flex flex-wrap justify-center gap-2 mb-6 bg-slate-950/50 p-4 rounded-2xl border border-slate-700 shadow-inner">';
            for(let i=0; i < Math.min(num2, 10); i++) {
                html += `<div class="bg-slate-900 p-1 rounded-lg border border-slate-800 flex gap-0.5 shadow-sm">`;
                for(let j=0; j < Math.min(num1, 10); j++) {
                    html += `<span class="text-xl animate-in zoom-in" style="animation-delay: ${j * 50}ms; filter: ${filter}">${emoji}</span>`;
                }
                html += `</div>`;
            }
            html += '</div>';
            return html;
        }

        function selectStory(id) { state.storyType = id; state.gameState = 'selectMode'; render(); }
        function nextFloor() { state.floor++; generateQuestion(state.floor, state.storyType); }
        window.onload = () => render();
    </script>
</body>
</html>
