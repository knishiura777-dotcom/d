    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fefce8; /* yellow-50 */
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes scroll-up {
            from { transform: translateY(100%); }
            to { transform: translateY(-200%); }
        }
        .animate-wiggle { animation: wiggle 0.5s infinite ease-in-out; }
        .animate-spin-slow { animation: spin-slow 4s linear infinite; }
        .animate-bounce-short { animation: bounce-short 0.3s infinite ease-in-out; }
        .animate-scroll-up { animation: scroll-up 20s linear infinite; }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-15%) rotate(10deg); }
            50% { transform: translateY(0) rotate(-10deg); }
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
        
        .collection-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .collection-scroll::-webkit-scrollbar-track {
            background: #f3e8ff;
            border-radius: 10px;
        }
        .collection-scroll::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }
    </style>
</head>

        const appTitle = document.getElementById('app-title');
        const footerText = document.getElementById('footer-text');
        const versionInfo = document.getElementById('version-info');

        // --- Generator Functions ---
        function getRewardById(id, lang) {
            const t = I18N[lang];
            const prefixIdx = Math.floor(id / t.genSubjects.length);
            const subjectIdx = id % t.genSubjects.length;
            const prefix = t.genPrefixes[prefixIdx];
            const subject = t.genSubjects[subjectIdx];
            return {
                id: id,
                name: lang === 'ja' ? `${prefix}${subject.name}` : `${prefix} ${subject.name}`,
                emoji: subject.emoji,
                desc: t.genDesc
            };
        }

        function generateFeedback(isCorrect, lang) {
            const t = I18N[lang];
            const pIdx = Math.floor(Math.random() * 25);
            const sIdx = Math.floor(Math.random() * 20);
            
            if (isCorrect) {
                const prefix = t.fbCorrectPrefix[pIdx];
                const suffix = t.fbCorrectSuffix[sIdx];
                return lang === 'ja' ? `${prefix}${suffix}` : `${prefix} ${suffix}`;
            } else {
                const prefix = t.fbWrongPrefix[pIdx];
                const suffix = t.fbWrongSuffix[sIdx];
                return `${prefix} ${suffix}`;
            }
        }

        // --- Core Functions ---
        function setView(newView) {
            state.view = newView;
            if (newView === 'menu' || newView === 'opening') {
                homeBtn.classList.add('hidden');
            } else {
                homeBtn.classList.remove('hidden');
            }
            render();
        }

        function toggleLanguage() {
            state.lang = state.lang === 'ja' ? 'en' : 'ja';
            render();
        }

        function handleAnswer(ans) {
            if (state.feedback) return;
            const isCorrect = ans === state.gameQuestion.correct;
            const t = I18N[state.lang];

            if (isCorrect) {
                state.feedback = { type: 'correct', text: generateFeedback(true, state.lang) };
                state.stars++;
            } else {
                state.feedback = { type: 'wrong', text: generateFeedback(false, state.lang) };
            }
            render();

            setTimeout(() => {
                if (state.currentIndex < 5) {
                    state.currentIndex++;
                    generateQuestion(state.currentDan);
                    render();
                } else {
                    const rewardId = Math.floor(Math.random() * TOTAL_REWARDS_COUNT);
                    state.reward = getRewardById(rewardId, state.lang);
                    if (!state.collectedIds.includes(rewardId)) {
                        state.collectedIds.push(rewardId);
                        localStorage.setItem('kuku_collected_ids', JSON.stringify(state.collectedIds));
                    }
                    
                    // Check if 100% reached
                    if (state.collectedIds.length >= TOTAL_REWARDS_COUNT && !state.endingSeen) {
                        setView('ending');
                    } else {
                        setView('result');
                    }
                }
            }, 1500);
        }

        function generateQuestion(dan) {
            const num2 = Math.floor(Math.random() * 9) + 1;
            const correct = dan * num2;
            let choices = new Set([correct]);
            while (choices.size < 4) {
                const offset = Math.floor(Math.random() * 5) - 2;
                const wrong = Math.max(1, correct + (offset * dan) || Math.floor(Math.random() * 81) + 1);
                choices.add(wrong);
            }
            state.gameQuestion = { dan, num2, correct };
            state.options = Array.from(choices).sort((a, b) => a - b);
            state.feedback = null;
        }

        function startStudy(dan) {
            state.currentDan = dan;
            state.currentIndex = 1;
            setView('study');
        }

        function startGame(dan) {
            state.currentDan = dan;
            state.stars = 0;
            state.currentIndex = 1;
            generateQuestion(dan);
            setView('game');
        }

        function skipToMenu() {
            localStorage.setItem('kuku_intro_seen', 'true');
            setView('menu');
        }

        // --- Render Helpers ---
        function renderVisualGrid(rows, cols) {
            let gridHtml = `<div class="grid gap-1 p-2 bg-white rounded-xl shadow-inner inline-grid border-4 border-yellow-100">`;
            for (let r = 0; r < 9; r++) {
                gridHtml += `<div class="flex gap-1">`;
                for (let c = 0; c < 9; c++) {
                    const isActive = r < rows && c < cols;
                    gridHtml += `
                        <div class="w-5 h-5 md:w-7 md:h-7 rounded transition-all duration-300 flex items-center justify-center text-[10px] 
                            ${isActive ? 'bg-yellow-400 shadow-sm scale-100' : 'bg-gray-100 scale-75 opacity-10'}">
                            ${isActive ? '🍭' : ''}
                        </div>`;
                }
                gridHtml += `</div>`;
            }
            gridHtml += `</div>`;
            return gridHtml;
        }

                            <button onclick="skipToMenu()" class="p-6 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-3xl font-black text-xl shadow-xl hover:scale-105 transition-all border-b-8 border-purple-800 active:translate-y-2 active:border-b-4">
                                ${t.startApp}
                            </button>
                        </div>
                        <button onclick="skipToMenu()" class="text-gray-400 font-bold hover:text-purple-400 underline underline-offset-4">
                            ${t.skip}
                        </button>
                    </div>`;
            }

            // --- View: Ending ---
            else if (state.view === 'ending') {
                state.endingSeen = true;
                mainCard.className += " bg-gray-900 border-yellow-400";
                mainCard.innerHTML = `
                    <div class="absolute inset-0 pointer-events-none overflow-hidden">
                        <div class="animate-scroll-up absolute top-0 left-0 w-full text-center text-yellow-200 opacity-80 space-y-10 font-bold">
                            <h3 class="text-5xl font-black text-yellow-400 mb-20">END ROLL</h3>
                            ${t.credits.map(c => `<p class="text-2xl">${c}</p>`).join('')}
                            <div class="text-6xl py-20">👑</div>
                            <p class="text-3xl">FIN</p>
                        </div>
                    </div>
                    <div class="relative z-10 flex flex-col items-center justify-center h-full text-center space-y-6">
                        <i data-lucide="trophy" class="w-24 h-24 text-yellow-400 animate-bounce"></i>
                        <h2 class="text-3xl font-black text-white italic leading-tight">${t.endingTitle}</h2>
                        <p class="text-white font-bold px-4">${t.endingMsg}</p>
                        <button onclick="setView('menu')" class="px-10 py-4 bg-yellow-400 text-gray-900 rounded-full font-black shadow-xl hover:scale-105 active:scale-95 transition-all">
                            ${t.back}
                        </button>
                    </div>
                    <button onclick="setView('menu')" class="absolute top-4 right-4 text-white/50 hover:text-white font-bold underline underline-offset-4 z-20">
                        ${t.skip}
                    </button>`;
            }

            // --- View: Menu ---
            else if (state.view === 'menu') {
                const percent = Math.floor((state.collectedIds.length / TOTAL_REWARDS_COUNT) * 100);
                mainCard.innerHTML = `
                    <div class="w-full text-center">
                        <div class="mb-6 flex flex-col md:flex-row justify-between items-center px-2 gap-4">
                             <div class="animate-pulse text-gray-500 font-bold italic">${t.menuPrompt}</div>
                             <button onclick="setView('collection')" class="flex items-center gap-2 bg-purple-100 text-purple-700 px-5 py-2 rounded-full font-bold hover:bg-purple-200 transition-all shadow-sm">
                                <i data-lucide="camera" class="w-4 h-4"></i> ${t.collection} (${percent}%)
                             </button>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            ${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(dan => `
                                <div class="flex flex-col gap-2">
                                    <button onclick="startStudy(${dan})" class="h-24 bg-gradient-to-b from-purple-400 to-purple-600 text-white rounded-3xl text-3xl font-black shadow-[0_8px_0_rgb(126,34,206)] transform active:translate-y-1 active:shadow-none transition-all flex flex-col items-center justify-center">
                                        <span class="text-[10px] bg-white text-purple-600 px-2 rounded-full mb-1">${t.levelLabel}</span>
                                        ${dan}
                                    </button>
                                    <button onclick="startGame(${dan})" class="h-10 bg-pink-500 text-white rounded-full text-xs font-bold shadow-md hover:scale-105 transition-transform">
                                        ${t.miniGame}
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            else if (state.view === 'collection') {
                mainCard.innerHTML = `
                    <div class="w-full flex flex-col items-center h-full max-h-[500px]">
                        <h2 class="text-2xl font-black text-purple-600 flex items-center gap-2 mb-2">
                            <i data-lucide="camera"></i> ${t.collectionTitle}
                        </h2>
                        <p class="text-xs text-purple-400 font-bold mb-4">${t.progress}: ${state.collectedIds.length} / ${TOTAL_REWARDS_COUNT}</p>
                        
                        <div class="collection-scroll flex-1 overflow-y-auto w-full grid grid-cols-2 md:grid-cols-3 gap-3 pr-2">
                            ${Array.from({length: TOTAL_REWARDS_COUNT}).map((_, i) => {
                                const isCollected = state.collectedIds.includes(i);
                                const reward = getRewardById(i, state.lang);
                                return `
                                    <div class="bg-white p-3 rounded-2xl border-4 ${isCollected ? 'border-purple-200' : 'border-gray-50 grayscale opacity-20'} shadow-sm flex flex-col items-center text-center">
                                        <div class="text-3xl mb-1">${isCollected ? reward.emoji : '❓'}</div>
                                        <h3 class="font-bold text-[10px] leading-tight text-purple-700">${isCollected ? reward.name : t.locked}</h3>
                                    </div>`;
                            }).join('')}
                        </div>
                        
                        <button onclick="setView('menu')" class="mt-4 px-10 py-3 bg-purple-500 text-white rounded-full font-bold shadow-lg border-b-4 border-purple-700 active:translate-y-1 transition-all">
                            ${t.back}
                        </button>
                    </div>`;
            }

            else if (state.view === 'study') {
                const styleStr = t.styles[state.currentDan - 1];
                const readingStr = state.lang === 'ja' 
                    ? t.readings[state.currentDan][state.currentIndex - 1] 
                    : `${state.currentDan} times ${state.currentIndex} is `;

                mainCard.innerHTML = `
                    <div class="flex flex-col items-center w-full space-y-4">
                        <div class="bg-purple-50 p-3 rounded-2xl border-2 border-purple-100 text-purple-700 font-bold animate-bounce text-xs">
                            ${t.challenge}: 「${styleStr}」${t.readPrompt}
                        </div>
                        <div class="text-center space-y-4">
                            <div class="flex items-center justify-center gap-4 text-5xl md:text-8xl font-black text-gray-800 drop-shadow-lg">
                                <span>${state.currentDan}</span>
                                <span class="text-pink-500">×</span>
                                <span>${state.currentIndex}</span>
                                <span class="text-gray-300">=</span>
                                <span class="text-purple-600">${state.currentDan * state.currentIndex}</span>
                            </div>
                            <div class="text-2xl bg-yellow-300 text-purple-900 font-black rounded-2xl px-6 py-3 rotate-1 shadow-lg border-4 border-white inline-block">
                                ${readingStr}
                                <span class="text-red-600 ml-1">${state.currentDan * state.currentIndex}</span>!
                            </div>
                        </div>

                        ${renderVisualGrid(state.currentDan, state.currentIndex)}

                        <div class="flex justify-between w-full pt-4">
                            <button onclick="state.currentIndex--; render()" class="px-6 py-3 rounded-full font-bold transition-all ${state.currentIndex === 1 ? 'invisible' : 'bg-gray-100 hover:bg-gray-200'}">
                                ${t.prev}
                            </button>
                            ${state.currentIndex < 9 ? `
                                <button onclick="state.currentIndex++; render()" class="px-10 py-3 bg-purple-500 text-white rounded-full text-xl font-black shadow-xl hover:scale-105 active:scale-95 transition-all border-b-4 border-purple-700">
                                    ${t.next}
                                </button>
                            ` : `
                                <button onclick="startGame(${state.currentDan})" class="px-10 py-3 bg-pink-500 text-white rounded-full text-xl font-black shadow-xl animate-pulse border-b-4 border-pink-700">
                                    ${t.goPlay}
                                </button>
                            `}
                        </div>
                    </div>`;
            }

            else if (state.view === 'game') {
                mainCard.innerHTML = `
                    <div class="flex flex-col items-center w-full space-y-8">
                        <div class="flex items-center gap-2 text-purple-600 font-black">
                            <i data-lucide="ghost" class="animate-wiggle"></i> ${t.stage} ${state.currentIndex} / 5
                        </div>

                        <div class="text-center">
                            <div class="text-6xl md:text-8xl font-black text-gray-800 p-8 rounded-[50px] bg-yellow-50 border-8 border-dashed border-yellow-200 relative inline-block">
                                ${state.gameQuestion.dan} × ${state.gameQuestion.num2} = <span class="text-pink-500">?</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 w-full max-w-sm">
                            ${state.options.map((opt) => `
                                <button onclick="handleAnswer(${opt})" ${state.feedback ? 'disabled' : ''} 
                                    class="h-20 text-4xl font-black rounded-[30px] shadow-lg transition-all transform active:scale-90 border-b-8
                                    ${state.feedback?.type === 'correct' && opt === state.gameQuestion.correct ? 'bg-green-400 text-white border-green-600 scale-105' :
                                      state.feedback?.type === 'wrong' && opt === state.gameQuestion.correct ? 'bg-green-400 text-white border-green-600' :
                                      state.feedback?.type === 'wrong' && opt !== state.gameQuestion.correct ? 'bg-gray-200 text-gray-400 border-gray-300 grayscale opacity-50' :
                                      'bg-white text-purple-800 hover:bg-purple-50 border-purple-200'}">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>

                        ${state.feedback ? `
                            <div class="text-2xl font-black animate-bounce-short text-center px-4 leading-snug py-4 bg-purple-50 rounded-2xl border-2 border-purple-100 shadow-sm ${state.feedback.type === 'correct' ? 'text-pink-600' : 'text-gray-500'}">
                                ${state.feedback.text}
                            </div>
                        ` : ''}
                    </div>`;
            }

            else if (state.view === 'result') {
                mainCard.innerHTML = `
                    <div class="flex flex-col items-center w-full space-y-4 text-center">
                        <i data-lucide="trophy" class="w-16 h-16 text-yellow-400 animate-bounce"></i>
                        <h2 class="text-3xl font-black text-purple-600 italic leading-tight">${t.successTitle}</h2>
                        
                        <div class="bg-gradient-to-r from-pink-50 to-purple-50 p-6 rounded-[40px] border-4 border-white shadow-xl w-full">
                            <div class="flex justify-center gap-1 mb-3">
                                ${[0, 1, 2, 3, 4].map(i => `
                                    <i data-lucide="star" class="w-6 h-6 ${i < state.stars ? 'text-yellow-400 fill-current' : 'text-gray-200'}"></i>
                                `).join('')}
                            </div>
                            
                            <div class="bg-white p-4 rounded-3xl shadow-inner border-2 border-dashed border-purple-200">
                                <p class="text-gray-400 text-[10px] font-bold mb-1">${t.rewardLabel}</p>
                                <div class="text-7xl mb-1 hover:scale-110 transition-transform cursor-pointer">${state.reward.emoji}</div>
                                <h3 class="text-xl font-black text-purple-700">${state.reward.name}</h3>
                                <p class="text-[10px] text-gray-400">${state.reward.desc}</p>
                            </div>
                        </div>
                        
                        <div class="flex gap-4 w-full pt-2">
                            <button onclick="startGame(${state.currentDan})" class="flex-1 p-4 bg-pink-500 text-white rounded-3xl font-black shadow-lg border-b-4 border-pink-700 active:translate-y-1">${t.playAgain}</button>
                            <button onclick="setView('menu')" class="flex-1 p-4 bg-purple-500 text-white rounded-3xl font-black shadow-lg border-b-4 border-purple-700 active:translate-y-1">${t.back}</button>
                        </div>
                    </div>`;
            }

            lucide.createIcons();
        }

        // --- Event Listeners ---
        homeBtn.addEventListener('click', () => setView('menu'));
        langToggle.addEventListener('click', toggleLanguage);

        // Init
        render();
    </script>
</body>
</html>
