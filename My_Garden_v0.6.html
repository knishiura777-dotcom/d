        function runCalculations(answers) {
            const C = {};
            QUESTIONS.forEach(q => {
                const val = answers[q.id];
                if (val === undefined) {
                    C[q.id] = "";
                } else {

            });

            const getScore = (qIds) => {
                const sum = qIds.reduce((acc, id) => acc + (C[id] || 0), 0);
                return ((sum - 5) / 20) * 100;
            };

            const O = getScore([1, 6, 11, 16, 21]);
            const C_score = getScore([2, 7, 12, 17, 22]);
            const E = getScore([3, 8, 13, 18, 24]);
            const A = getScore([4, 9, 14, 19, 23]);
            const N = getScore([5, 10, 15, 20, 25]);

            const scoreF = (O + E) / 2;
            const scoreD = (O + (100 - E)) / 2;
            const scoreH = ((100 - O) + E) / 2;
            const scoreP = ((100 - O) + (100 - E)) / 2;

            const l1Scores = { F: scoreF, D: scoreD, H: scoreH, P: scoreP };
            const sortedL1 = Object.entries(l1Scores).sort((a, b) => b[1] - a[1]);
            const firstL1 = sortedL1[0][0];
            const secondL1 = sortedL1[1][0];
            const purityL1 = Math.round(sortedL1[0][1]);
            const diffL1 = sortedL1[0][1] - sortedL1[1][1];
            const labelL1 = diffL1 === 0 ? "同率型" : (diffL1 >= 20 ? "明確なタイプ" : (diffL1 >= 10 ? "やや混合型" : "ハイブリッド型"));

            const scoreR = (C_score + (100 - N)) / 2;
            const scoreM = (C_score + N) / 2;
            const scoreG = ((100 - C_score) + (100 - N)) / 2;
            const scoreV = ((100 - C_score) + N) / 2;

            const l2Scores = { R: scoreR, M: scoreM, G: scoreG, V: scoreV };
            const sortedL2 = Object.entries(l2Scores).sort((a, b) => b[1] - a[1]);
            const firstL2 = sortedL2[0][0];
            const secondL2 = sortedL2[1][0];
            const purityL2 = Math.round(sortedL2[0][1]);
            const diffL2 = sortedL2[0][1] - sortedL2[1][1];
            const labelL2 = diffL2 === 0 ? "同率型" : (diffL2 >= 20 ? "明確なタイプ" : (diffL2 >= 10 ? "やや混合型" : "ハイブリッド型"));

            const scoreS = A;
            const scoreI = 100 - A;

            const l3Scores = { S: scoreS, I: scoreI };
            const sortedL3 = Object.entries(l3Scores).sort((a, b) => b[1] - a[1]);
            const firstL3 = sortedL3[0][0];
            const secondL3 = sortedL3[1][0];
            const purityL3 = Math.round(sortedL3[0][1]);
            const diffL3 = Math.abs(scoreS - scoreI);
            const labelL3 = diffL3 === 0 ? "同率型" : (diffL3 >= 20 ? "明確なタイプ" : (diffL3 >= 10 ? "やや混合型" : "ハイブリッド型"));

            const finalCode = `${firstL1}-${firstL2}-${firstL3}`;

            const targetO = (firstL1 === 'F' || firstL1 === 'D') ? O : (100 - O);
            const targetE = (firstL1 === 'F' || firstL1 === 'H') ? E : (100 - E);
            const targetC = (firstL2 === 'R' || firstL2 === 'M') ? C_score : (100 - C_score);
            const targetN = (firstL2 === 'M' || firstL2 === 'V') ? N : (100 - N);
            const targetA = (firstL3 === 'S') ? A : (100 - A);
            
            const matchScore = Math.round((targetO + targetE + targetC + targetN + targetA) / 5);

            return {
                ocean: { O, C: C_score, E, A, N },

                layers: {
                    energy: { primary: firstL1, purity: purityL1, secondary: secondL1, label: labelL1 },
                    adaptation: { primary: firstL2, purity: purityL2, secondary: secondL2, label: labelL2 },
                    relation: { primary: firstL3, purity: purityL3, secondary: secondL3, label: labelL3 }
                }
            };
        }

                                            この診断は、もっとも信頼性の高い心理データ（Big Five）を使用し、あなたの個性を愛らしいハーブや花の生存戦略に変換して「お互いを優しく労り合う」ための自己理解・対話ツールです。
                                        </p>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6 text-xs leading-relaxed text-brand-dark/90 font-medium">

                                                <span className="text-brand-blush font-bold text-sm">1. 優劣をつけない</span><br />テストの点数で能力を競うものではありません。誰もが特別な一輪のお花です。
                                            </div>
                                            <div className="bg-white/60 backdrop-blur p-4 rounded-2xl border border-brand-sageLight/50 shadow-sm">
                                                <span className="text-brand-blush font-bold text-sm">2. 枠にはめ込まない</span><br />すべての人が複数のハーブの性質をブレンドして持っています。

                                            <div className="bg-white/60 backdrop-blur p-4 rounded-2xl border border-brand-sageLight/50 shadow-sm">

                                </div>
                            </div>

                                                            {q.factor === 'C' && 'きっちりまじめ'}
                                                            {q.factor === 'E' && 'おしゃべり大好き'}
                                                            {q.factor === 'A' && 'ふんわり共生'}
                                                            {q.factor === 'N' && 'ピュア感度'}
                                                        </span>
                                                    </div>
                                                    <p className="text-sm font-bold leading-relaxed text-brand-dark mb-4">{q.text}</p>

                                                        {[1, 2, 3, 4, 5].map((val) => (

                                    </div>

                                {/* 右側：お花診断レポート */}
                                <div className="lg:col-span-7 space-y-6">

                                                <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
                                                    <div>
                                                        <div className="inline-flex items-center gap-1.5 bg-brand-sageLight text-brand-sage text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest border border-brand-sage/20">
                                                            {result.code}
                                                        </div>
                                                        <span className="ml-3 text-xs text-brand-sage font-bold">

                                                        </span>
                                                    </div>

                                                    </div>

                                                    <span className="text-[10px] text-brand-sage uppercase font-bold tracking-widest block">あなたに咲いたすてきなお花</span>
                                                    <h2 className="text-2xl sm:text-4xl font-extrabold tracking-tight text-brand-dark flex flex-wrap items-center gap-3 font-serif">
                                                        {FULL_MASTER[result.code]?.organism} タイプ
                                                        <span className="text-xs bg-[#F7F2EB] text-brand-sage font-bold px-3 py-1.5 rounded-full border border-brand-sageLight">
                                                            {FULL_MASTER[result.code]?.role.split('（')[0]}
                                                        </span>

                                                    </div>
                                                </div>

                                                    {FULL_MASTER[result.code]?.quote}
                                                </div>
                                            </div>

                                                                    {result.layers.energy.primary === 'F' && ' 探索者 (Forager) - 外に元気に咲くお花'}
                                                                    {result.layers.energy.primary === 'D' && ' 潜行者 (Diver) - 森のなかの温室植物'}

                                                                {result.layers.energy.label}

                                                            サブタイプ（もう一つのあなた）: <span className="text-brand-dark font-bold">{result.layers.energy.secondary}</span>

                                                                    {result.layers.adaptation.primary === 'G' && ' 滑空者 (Glider) - 風にのってのびのび'}

                                                                </span>

                                                                {result.layers.adaptation.label}

                                                            </div>

                                                        </div>
                                                        <p className="text-[10px] text-brand-sage mt-1 font-semibold">

                                                            <span className="bg-white text-brand-sage px-2 py-0.5 rounded text-[10px] font-bold">
                                                                {result.layers.relation.label}
                                                            </span>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <div className="flex-1 bg-brand-sageLight/40 h-2 rounded-full overflow-hidden">
                                                                <div className="bg-brand-blush h-full rounded-full" style={{ width: `${result.layers.relation.purity}%` }}></div>
                                                            </div>
                                                            <span className="text-xs font-bold text-brand-sage w-8 text-right">{result.layers.relation.purity}%</span>
                                                        </div>
                                                        <p className="text-[10px] text-brand-sage mt-1 font-semibold">
                                                            サブタイプ（もう一つのあなた）: <span className="text-brand-dark font-bold">{result.layers.relation.secondary}</span>
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 生態系詳細・強み・適性学部 */}
                                            <div className="bg-white border border-brand-sageLight/50 p-6 sm:p-8 rounded-[2rem] shadow-xl shadow-brand-sageLight/5 space-y-6">
                                                <div>

                                                            お水があふれちゃったとき（リスク）
                                                        </h4>
                                                        <ul className="text-xs text-brand-dark space-y-2 list-disc pl-4 font-semibold leading-relaxed">

                                                                <li key={idx}>{r}</li>
                                                            ))}
                                                        </ul>
                                                    </div>

                                                            枯れそうなときの回復アロマ
                                                        </h4>

                                                    </div>

                                                    <div>
                                                        <h4 className="font-extrabold text-brand-blush flex items-center gap-2 mb-2">
                                                            <BookIcon className="w-4 h-4" />
                                                            のびのび進路＆マッチする適性学部
                                                        </h4>
                                                        <p className="text-brand-sage font-semibold leading-relaxed">{FULL_MASTER[result.code]?.niche}</p>
                                                    </div>

                                            <FlowerIcon className="w-16 h-16 text-brand-sageLight mb-4 animate-bounce" />
                                            <h3 className="text-lg font-bold text-brand-dark font-serif tracking-wider">わたし色のお庭カルテを作成</h3>
                                            <p className="text-xs text-brand-sage max-w-sm mt-3 leading-relaxed font-semibold">
                                                左側の質問に直感でタップして進めるか、「デモ回答を流し込む」をタップすると、あなた自身の輝きに満ちたボタニカルタイプと進路のアドバイスが表示されます。
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ==========================================
                            B. チームお庭マップ (心の寄せ植え)
                            ========================================== */}
                        {activeTab === 'team' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="bg-white border border-brand-sageLight/60 p-6 sm:p-8 rounded-[2rem] shadow-xl shadow-brand-sageLight/10 grid grid-cols-1 lg:grid-cols-12 gap-6 items-center">

                                            お互いの違いを認め合うことで、どのような心地いい生態系が作られるかを視覚的に分析できます。<br />
                                            <strong>たて軸</strong>：共生・寄り添い ⇄ 孤高・一本立ち | <strong>よこ軸</strong>：新しいこと大好き ⇄ のんびり安定

                                                id="mock-code-select"

                                            >
                                                <option value="F-R-S">アネモネ園芸家 (F-R-S)</option>
                                                <option value="F-V-S">ミントネットワーク (F-V-S)</option>
                                                <option value="D-M-S">イングリッシュアイビー (D-M-S)</option>
                                                <option value="D-V-I">ワイルドローズ (D-V-I)</option>
                                                <option value="H-R-S">しっかりラベンダー (H-R-S)</option>
                                                <option value="H-V-S">ユーカリリーダー (H-V-S)</option>
                                                <option value="P-R-I">まじめなオリーブ (P-R-I)</option>
                                                <option value="P-V-S">スイートピーセンサー (P-V-S)</option>
                                            </select>
                                            <button 
                                                onClick={() => {
                                                    const select = document.getElementById('mock-code-select');
                                                    addMockMember(select.value);
                                                }}
                                                className="bg-gradient-to-r from-brand-blush to-[#E2A6A6] text-white px-5 py-2.5 rounded-xl text-xs font-extrabold transition shadow-md shadow-brand-blush/20"
                                            >
                                                追加
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* 中部マップグラフィック */}
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    <div className="lg:col-span-8 bg-white border border-brand-sageLight/60 p-6 rounded-[2rem] shadow-xl flex flex-col justify-between">
                                        <div className="text-center text-xs font-bold text-brand-sage tracking-widest uppercase mb-4">
                                            ✿ 【お話大好き・寄り添い寄せ植えエリア】
                                        </div>

                                        <div className="relative h-[420px] bg-brand-linen/20 rounded-2xl border border-brand-sageLight/40 flex items-center justify-center overflow-hidden">
                                            {/* 十字架マッピング軸 */}
                                            <div className="absolute w-full h-[1px] bg-brand-sageLight/60"></div>
                                            <div className="absolute h-full w-[1px] bg-brand-sageLight/60"></div>

                                            {/* 軸のラベル */}
                                            <span className="absolute left-3 text-[10px] text-brand-sage bg-[#FDFBF7] px-2 py-1 rounded border border-brand-sageLight/50 font-bold">
                                                【のんびり安定が好き】
                                            </span>
                                            <span className="absolute right-3 text-[10px] text-brand-blush bg-[#FDFBF7] px-2 py-1 rounded border border-brand-blush/30 font-bold">
                                                【新しいこと大好き】
                                            </span>

                                            {/* 自動マッピングされるお花たち */}
                                            {teamMembers.map((member, idx) => {
                                                const calc = runCalculations(member.answers);
                                                if (!calc) return null;

                                                const exploreX = ((calc.ocean.O + calc.ocean.E) / 2) - (((100 - calc.ocean.O) + (100 - calc.ocean.E)) / 2); 
                                                const relationY = calc.ocean.A - (100 - calc.ocean.A); 

                                                const leftPercent = 50 + (exploreX / 2.3); 
                                                const topPercent = 50 - (relationY / 2.3); 

                                                const colors = {
                                                    "F-R-S": "from-[#D5F3EE] to-[#C0ECE5] text-teal-950 border-teal-200",
                                                    "F-V-S": "from-[#FDF2F4] to-[#F5DCDC] text-pink-950 border-brand-blush/30",
                                                    "D-M-S": "from-[#EBE0F5] to-[#DFCCED] text-purple-950 border-purple-200",
                                                    "D-V-I": "from-[#FCEDEB] to-[#F7D8D5] text-rose-950 border-rose-200",
                                                    "H-R-S": "from-[#FCF7D9] to-[#F7EEAC] text-amber-950 border-amber-200",
                                                    "H-V-S": "from-[#FCECD9] to-[#FCD9C2] text-orange-950 border-orange-200",
                                                    "P-R-I": "from-[#E3F2E1] to-[#C8E6C4] text-emerald-950 border-emerald-200",
                                                    "P-V-S": "from-[#FCEDF4] to-[#F7D4E6] text-pink-950 border-pink-200"
                                                };
                                                const colorClass = colors[calc.code] || "from-brand-sageLight to-white text-brand-dark border-brand-sageLight";

                                                return (
                                                    <div 
                                                        key={idx}
                                                        className="absolute transform -translate-x-1/2 -translate-y-1/2 transition-all duration-500 hover:scale-110 z-10 group"
                                                        style={{ left: `${leftPercent}%`, top: `${topPercent}%` }}
                                                    >
                                                        <div className={`px-3 py-1.5 rounded-xl bg-gradient-to-r ${colorClass} text-[10px] font-bold border shadow-md flex items-center gap-1.5 cursor-pointer`}>
                                                            <span className="font-extrabold">{FULL_MASTER[calc.code]?.organism}</span>
                                                            <span className="bg-white/40 px-1.5 py-0.5 rounded-md font-bold text-brand-dark">{member.name}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="text-center text-xs font-bold text-brand-sage tracking-widest uppercase mt-4">
                                            ✿ 【自分を大切に守る・一本立ちエリア】
                                        </div>
                                    </div>

                                    {/* メンバーリスト削除コンソール */}
                                    <div className="lg:col-span-4 bg-[#FAF7F2] border border-brand-sageLight/60 p-6 rounded-[2rem] shadow-xl flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-sm font-bold text-brand-dark mb-4 flex items-center gap-2 font-serif tracking-wider">
                                                <UsersIcon className="w-4 h-4 text-brand-blush" />
                                                集まったお友達の根っこ
                                            </h3>
                                            <div className="space-y-3 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                                {teamMembers.map((member, idx) => {
                                                    const calc = runCalculations(member.answers);
                                                    if (!calc) return null;
                                                    const meta = FULL_MASTER[calc.code];

                                                    return (
                                                        <div key={idx} className="bg-white p-3.5 rounded-2xl border border-brand-sageLight/40 flex items-center justify-between shadow-sm">
                                                            <div>
                                                                <span className="text-xs font-extrabold text-brand-dark block">{member.name}</span>
                                                                <span className="text-[10px] text-brand-blush font-bold">
                                                                    {calc.code} ➔ {meta.organism}
                                                                </span>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <span className="bg-brand-sageLight/50 text-brand-sage text-[9px] font-bold px-2 py-1 rounded-full border border-brand-sageLight">
                                                                    {meta.role.split('（')[0]}
                                                                </span>
                                                                <button 
                                                                    onClick={() => deleteMember(idx)}
                                                                    className="text-brand-sageLight hover:text-brand-blush p-1 transition"
                                                                >
                                                                    <TrashIcon className="w-4 h-4" />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div className="mt-6 pt-4 border-t border-brand-sageLight/40 text-xs text-brand-sage font-bold leading-relaxed">
                                            ※お友達を増やすと、みんなが一緒に活動したときの生態系の形が変化して、より詳細なお庭診断シートが生成されます。
                                        </div>
                                    </div>
                                </div>

                                {/* 生態系調和診断レポート（女子大ライフ特化） */}
                                {(() => {
                                    const rolesCount = {};
                                    teamMembers.forEach(m => {
                                        const calc = runCalculations(m.answers);
                                        if (calc) {
                                            const r = FULL_MASTER[calc.code]?.role.split('（')[0];
                                            rolesCount[r] = (rolesCount[r] || 0) + 1;
                                        }
                                    });

                                    const total = teamMembers.length;
                                    const excessRoles = Object.entries(rolesCount).filter(([_, count]) => count / total > 0.4).map(([r]) => r);
                                    const lacksExecutor = !rolesCount["Executor"] && !rolesCount["Executor（ルーティン・品質維持）"];

                                    return (
                                        <div className="bg-white border-2 border-pink-100/60 p-6 sm:p-8 rounded-[2rem] shadow-xl space-y-6">
                                            <div>
                                                <h3 className="text-md font-bold text-brand-dark flex items-center gap-2 font-serif tracking-wider">
                                                    <SparklesIcon className="w-5 h-5 text-brand-blush" />
                                                    お庭の「寄せ植え」協調レポート（チームの空気感）
                                                </h3>
                                                <p className="text-xs text-brand-sage font-bold mt-1">
                                                    お友達同士の組み合わせから、どのような楽しいコラボレーションや女子大での学びに強いか自動計算しました。
                                                </p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm font-semibold leading-relaxed">
                                                <div className="bg-[#FCFAF6] p-5 rounded-2xl border border-brand-sageLight/40">
                                                    <h4 className="text-xs font-extrabold text-brand-sage uppercase tracking-wider mb-2">わたしたちのお庭モデル</h4>
                                                    <span className="text-lg font-bold text-brand-blush block">
                                                        ふんわり寄り添う、アロマ＆ミントネットワーク型
                                                    </span>
                                                    <p className="text-xs text-brand-sage mt-2 leading-relaxed">
                                                        とにかくみんなが優しく、お互いの悩みや不満をゆっくり聞いて癒し合えるお庭です。女子大特有のギスギスしない、アットホームな居心地の良さを完璧に創り出せる素晴らしいグループ！
                                                    </p>
                                                </div>

                                                <div className="bg-[#FCFAF6] p-5 rounded-2xl border border-brand-sageLight/40 space-y-3 text-xs leading-relaxed text-brand-dark font-bold">
                                                    <h4 className="text-xs font-extrabold text-brand-sage uppercase tracking-wider">ときめき調和アドバイス</h4>
                                                    
                                                    {excessRoles.length > 0 && (
                                                        <div className="flex gap-2 text-amber-700 items-start font-bold">
                                                            <AlertTriangleIcon className="w-4 h-4 shrink-0 mt-0.5 text-amber-500" />
                                                            <span>
                                                                <strong>同じ役割のお花が多いかも ({excessRoles.join(', ')})</strong>：<br />
                                                                みんなが「空気を読もう」としすぎて、本当にやりたいことが進まなくなることがあります。ときには甘えて本音を言ってみて。
                                                            </span>
                                                        </div>
                                                    )}

                                                    {lacksExecutor && (
                                                        <div className="flex gap-2 text-brand-blush items-start font-bold">
                                                            <AlertTriangleIcon className="w-4 h-4 shrink-0 mt-0.5 text-brand-blush" />
                                                            <span>
                                                                <strong>「まじめなオリーブ（Executor）」がいない心配</strong>：<br />
                                                                イベントやお出かけの計画は盛り上がるけれど、誰が予約や連絡をするか押し付け合う傾向も。計画好きなラベンダータイプに頼りましょう！
                                                            </span>
                                                        </div>
                                                    )}

                                                    {!excessRoles.length && !lacksExecutor && (
                                                        <div className="flex gap-2 text-emerald-600 items-start font-bold">
                                                            <CheckIcon className="w-4 h-4 shrink-0 mt-0.5" />
                                                            <span>
                                                                <strong>完璧な寄せ植えの調和</strong>：おしゃべりなアネモネ、計画的なラベンダー、物静かなアイビーが、最高に美しいバランスで咲き誇っています。
                                                            </span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="pt-4 border-t border-brand-sageLight/50 grid grid-cols-1 md:grid-cols-2 gap-6 text-xs font-semibold">
                                                <div>
                                                    <h4 className="font-extrabold text-brand-sage uppercase tracking-wider mb-2">ふたりの相乗効果シナジー</h4>
                                                    <div className="space-y-2 text-brand-dark leading-relaxed">
                                                        <span className="text-brand-blush block font-extrabold">ミントネットワーク(F-V-S) × まじめなオリーブ(P-R-I)</span>
                                                        ミント型が「あれ可愛い！やりたい！」という新しい体験を外から持ち込み、それをオリーブ型が毎日コツコツ、宿題や準備といった定常タスクに確実に落とし込んでくれます。一過性で終わらない最高に信頼しあえるコンビ。
                                                    </div>
                                                </div>
                                                <div>
                                                    <h4 className="font-extrabold text-brand-blush uppercase tracking-wider mb-2">ときめきの摩擦注意報</h4>
                                                    <div className="space-y-2 text-brand-dark leading-relaxed">
                                                        <span className="text-[#9A7D4C] block font-extrabold">ワイルドローズ(D-V-I) × しっかりラベンダー(H-R-S)</span>
                                                        ラベンダーは「みんなのためにルールを守ろう！」と言いますが、ワイルドローズは「私は私のおしゃれと感性を貫きたい！」と主張します。お互いに個性のルーツが異なること（共生と孤高）を認め合うのが、ハッピーの秘訣。
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* ==========================================
                            C. 32タイプ図鑑
                            ========================================== */}
                        {activeTab === 'info' && (
                            <div className="space-y-6">
                                <div className="bg-white border-2 border-brand-sageLight/50 p-6 rounded-[2rem] shadow-xl shadow-brand-sageLight/10">
                                    <h2 className="text-lg font-bold text-brand-dark mb-2 flex items-center gap-2 font-serif tracking-wider">
                                        <LayersIcon className="w-5 h-5 text-brand-blush" />
                                        BIO-CODE / PSY-CODE 32タイプお花図鑑
                                    </h2>
                                    <p className="text-xs text-brand-sage leading-relaxed font-bold">
                                        お庭をカタチづくる3つの心の層（クリエイティブ心、おしゃべり度、やさしさ度）のかけ合わせで生まれる、すべての植物やハーブ、お花のリストです。<br />
                                        女子高生向けの「エモ名称」と、オープンキャンパスや進路選びで役立つ「安全名称（ハッピー役割）」を見比べながら、あなたの気になるハーブを見つけてね。
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {ALL_CODES.map(code => {
                                        const meta = FULL_MASTER[code];
                                        const isDetailed = MASTER_TABLE[code] !== undefined;

                                        return (
                                            <div 
                                                key={code} 
                                                className={`bg-white border-2 p-5 rounded-3xl transition hover:border-pink-300 relative overflow-hidden flex flex-col justify-between ${isDetailed ? 'border-pink-200 shadow-md shadow-pink-50' : 'border-brand-sageLight/50 opacity-85'}`}
                                            >
                                                <div className="space-y-3">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[9px] font-mono font-bold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-lg border border-pink-100">
                                                            {code}
                                                        </span>
                                                        {isDetailed && (
                                                            <span className="text-[9px] bg-emerald-50 text-emerald-600 border border-emerald-100 px-1.5 py-0.5 rounded-lg font-bold">
                                                                解説あり
                                                            </span>
                                                        )}
                                                    </div>

                                                    <div>
                                                        <h4 className="text-md font-extrabold text-emerald-950">{meta.organism} タイプ</h4>
                                                        <span className="text-[10px] text-emerald-700/80 font-bold">{meta.role}</span>
                                                    </div>

                                                    <div className="space-y-1 pt-2 border-t border-pink-50">
                                                        <span className="text-[9px] text-emerald-800 font-bold block">お仕事・進路での機能</span>
                                                        <p className="text-xs font-extrabold text-emerald-900 leading-tight">{meta.safeName}</p>
                                                    </div>

                                                    <div className="space-y-1">
                                                        <span className="text-[9px] text-pink-400 font-bold block">インスタ映えエモ名称</span>
                                                        <p className="text-xs font-extrabold text-pink-500 leading-tight">{meta.edgeName}</p>
                                                    </div>
                                                </div>

                                                <div className="mt-4 pt-3 border-t border-pink-50">
                                                    <p className="text-[11px] text-emerald-950 font-semibold line-clamp-3 leading-relaxed">
                                                        {meta.overview}
                                                    </p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* フッター */}
                    <footer className="border-t border-brand-sageLight/50 bg-[#FAF7F2] py-8 mt-12 text-center text-xs text-brand-sage">
                        <div className="max-w-7xl mx-auto px-4 space-y-2">
                            <p className="font-bold">© 2026 わたし色のお庭診断 ［PSY-CODE（仮）生態系パーソナリティ・マップ］</p>
                            <p className="text-[10px] text-brand-sage/80 max-w-lg mx-auto leading-relaxed font-semibold">
                                本診断システムは、信頼性の高いビッグファイブの理論に基づき、高校生の自己理解・進路選択・お友達との対話を優しく楽しむために設計されています。
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        // DOMへレンダリング
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
