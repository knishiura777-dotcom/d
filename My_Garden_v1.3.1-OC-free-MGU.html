    方針:

  <style>
    :root{
      --bg:#fbf8f3; --paper:#fff; --ink:#1e2e24; --muted:#687168;
      --gold:#c5a880; --gold2:#efe3d0; --line:#eadcd3; --sage:#8f9e8b;
      --blush:#f7ede7; --green:#e9f3eb; --rose:#fff0f3; --shadow:0 20px 50px rgba(30,46,36,.10);
      --radius:26px; --radius2:18px;
      --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",YuGothic,Meiryo,sans-serif;

    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0;min-height:100vh;color:var(--ink);font-family:var(--font);background:
      radial-gradient(circle at top left,rgba(197,168,128,.25),transparent 30%),
      radial-gradient(circle at bottom right,rgba(143,158,139,.25),transparent 28%),var(--bg);}
    button,input{font:inherit} button{cursor:pointer}
    .wrap{width:min(980px,calc(100% - 28px));margin:0 auto;padding:22px 0 34px}
    header{display:flex;justify-content:space-between;align-items:center;gap:16px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:22px}
    .brand{display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold2),#fff);box-shadow:var(--shadow);font-size:24px}
    h1{font-family:var(--serif);font-size:clamp(22px,4vw,34px);margin:0;letter-spacing:.06em}.sub{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
    .version{font-size:11px;font-weight:800;color:var(--ink);background:var(--gold2);border:1px solid rgba(197,168,128,.45);padding:7px 10px;border-radius:999px;white-space:nowrap}
    .card{background:rgba(255,255,255,.88);border:1px solid rgba(234,220,211,.85);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(20px,4vw,38px);backdrop-filter:blur(10px)}
    .hero{max-width:760px;margin:0 auto;text-align:center}.hero-emoji{font-size:56px;margin:10px 0 12px;animation:float 4s ease-in-out infinite}.hero h2{font-family:var(--serif);font-size:clamp(24px,5vw,40px);margin:0 0 10px}.lead{font-size:15px;line-height:1.9;color:var(--muted);max-width:620px;margin:0 auto 20px}
    .notice{background:var(--blush);border:1px solid var(--line);border-radius:18px;padding:12px 14px;font-size:12px;line-height:1.8;color:#5e5853;text-align:left;margin:20px auto;max-width:650px}

    .mgu-strip{max-width:760px;margin:0 auto 18px;padding:10px 14px;border:1px solid rgba(197,168,128,.42);border-radius:999px;background:rgba(255,255,255,.72);color:#665437;font-size:12px;font-weight:900;letter-spacing:.08em;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
    .mgu-chip{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:white;border-radius:999px;padding:5px 10px;font-size:11px;letter-spacing:.08em}.mgu-chip.pending{background:#78684e}.mgu-chip.official{background:#1e2e24}
    .mgu-card{background:linear-gradient(135deg,#fff,var(--blush));border:1px solid var(--line);border-radius:22px;padding:18px;margin:16px 0;text-align:left}.mgu-card h3{font-family:var(--serif);font-size:20px;margin:0 0 8px}.mgu-card p{font-size:13px;line-height:1.85;color:#515a52;margin:0 0 12px}.mgu-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.mgu-link{display:flex;align-items:center;justify-content:center;text-align:center;min-height:48px;text-decoration:none;border-radius:14px;border:1px solid rgba(197,168,128,.55);background:white;color:var(--ink);font-weight:900;font-size:12px;line-height:1.4;padding:10px}.mgu-link.primary-link{background:var(--ink);color:white;border-color:var(--ink)}.mgu-small{font-size:11px;color:var(--muted);line-height:1.7;margin-top:10px}
    .mgu-mini{background:rgba(233,243,235,.55);border:1px solid rgba(143,158,139,.35);border-radius:18px;padding:14px;margin:14px 0;font-size:13px;line-height:1.8;text-align:left;color:#465348}
    .primary{border:0;background:var(--ink);color:white;font-weight:800;letter-spacing:.08em;border-radius:16px;padding:15px 30px;box-shadow:0 12px 24px rgba(30,46,36,.18);transition:.16s}.primary:hover{transform:translateY(-2px);opacity:.94}.secondary{background:white;color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:12px 18px;font-weight:800}.ghost{background:transparent;color:var(--muted);border:0;font-weight:800}
    .progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}.bar{height:10px;background:var(--blush);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.9);margin-bottom:22px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#d8bc8d);border-radius:999px;transition:.25s}
    .qtag{display:inline-block;font-size:11px;font-weight:800;color:#6d5b38;background:var(--gold2);border:1px solid rgba(197,168,128,.45);padding:5px 10px;border-radius:999px;margin-bottom:12px}.question{font-family:var(--serif);font-size:clamp(19px,4vw,27px);line-height:1.65;text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:22px;padding:22px;margin:0 0 20px}
    .options{display:grid;gap:10px}.opt{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:white;border:1px solid var(--line);border-radius:16px;padding:14px 16px;text-align:left;transition:.16s}.opt:hover{border-color:var(--gold);transform:translateY(-1px)}.opt .left{display:flex;align-items:center;gap:12px}.opt .mark{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--blush);font-weight:900}.opt.selected{background:var(--ink);color:white;border-color:var(--ink)}.opt.selected .mark{background:var(--gold);color:var(--ink)}
    .result{max-width:780px;margin:0 auto;text-align:center}.result-top{position:relative;overflow:hidden;background:linear-gradient(135deg,#fff,var(--green));border:1px solid var(--line);border-radius:30px;padding:28px 20px;margin-bottom:16px}.result-top:before{content:"";position:absolute;inset:-70px auto auto -70px;width:180px;height:180px;background:rgba(197,168,128,.20);border-radius:50%}.result-emoji{font-size:74px;line-height:1;margin:4px 0 12px}.badge{display:inline-block;font-size:11px;font-weight:900;letter-spacing:.08em;color:#6a552d;background:var(--gold2);border:1px solid rgba(197,168,128,.45);padding:6px 10px;border-radius:999px;margin-bottom:12px}.type-name{font-family:var(--serif);font-size:clamp(30px,7vw,52px);margin:0 0 6px}.plant-name{font-size:14px;color:var(--muted);font-weight:800;margin-bottom:12px}.tagline{font-size:16px;line-height:1.8;max-width:590px;margin:0 auto;color:#39443a}
    .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}.mini{background:white;border:1px solid var(--line);border-radius:18px;padding:16px;text-align:left}.mini h3{font-size:12px;margin:0 0 8px;color:#7b6337;letter-spacing:.08em}.mini p{font-size:13px;line-height:1.8;color:#505950;margin:0}.locked{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.lock{background:rgba(255,255,255,.75);border:1px dashed #d5c4b7;border-radius:18px;padding:14px;text-align:left;color:#5f665f}.lock b{display:block;font-size:13px;margin-bottom:5px}.lock span{font-size:12px;line-height:1.7;color:var(--muted)}.cta-note{background:var(--blush);border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:14px;font-size:13px;line-height:1.8;color:#5f5852}
    .actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:18px}.tiny{font-size:11px;color:var(--muted);line-height:1.8;margin-top:16px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:white;padding:10px 16px;border-radius:999px;font-size:12px;box-shadow:var(--shadow);display:none}.toast.show{display:block}
    footer{margin-top:22px;border-top:1px solid var(--line);padding-top:14px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:11px}.loading{text-align:center;padding:48px}.spinner{width:54px;height:54px;border:5px solid var(--blush);border-top-color:var(--gold);border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes float{50%{transform:translateY(-8px) rotate(3deg)}}
    @media(max-width:760px){header{align-items:flex-start}.version{display:none}.mini-grid,.locked,.mgu-buttons{grid-template-columns:1fr}.card{padding:20px}.wrap{width:min(100% - 18px,980px)}.result-emoji{font-size:64px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">🌿</div>
        <div>
          <h1>わたし色のガーデン</h1>
          <div class="sub">宮城学院女子大学 教育学科・幼児教育専攻 OC体験版</div>
        </div>
      </div>
      <div class="version">v1.3.1-MGU</div>
    </header>
    <div id="mguOfficialStrip" class="mgu-strip"></div>
    <main id="app"></main>
    <footer>
      <div>© PSY-CODE // わたし色のガーデン MGU OC体験版</div>
      <div>宮城学院女子大学 教育学科・幼児教育専攻への導線つき無料版</div>

  <div id="toast" class="toast">コピーしました</div>

<script>
(function(){
  'use strict';

  const APP_VERSION = "v1.3.1-OC-free-MGU";
  const OFFICIAL_MODE = false; // 正式承認後に true にすると「公認」表示に切り替わります。
  const MGU = {
    name:"宮城学院女子大学 教育学科・幼児教育専攻",
    safeLabel:"オープンキャンパス体験アプリ",
    officialLabel:"公認アプリ",
    departmentUrl:"https://www.mgu.ac.jp/departments/kd/",
    specialUrl:"https://www.mgu.ac.jp/department/youzi.html",
    openCampusUrl:"https://www.mgu.ac.jp/information/opencampus/",
    requestUrl:"https://www.mgu.ac.jp/information/request/"
  };

  const QUESTIONS = [
    { text:"アートや自己表現、新しいアイデアを考えることが好きだ。", trait:"O", sign:1, tag:"感性・アイデア" },
    { text:"スケジュールを立てて、宿題や準備を計画的に進めることが多い。", trait:"C", sign:1, tag:"計画と実行" },
    { text:"友達と話したり出かけたりすると、元気が湧いてくる。", trait:"E", sign:1, tag:"コミュニケーション" },
    { text:"困っている友達がいたら放っておけず、できるだけ力になりたい。", trait:"A", sign:1, tag:"共感とサポート" },
    { text:"ちょっとした視線や「どう思われているかな」が気になりやすい。", trait:"S", sign:1, tag:"繊細さ・共鳴力" },
    { text:"冒険するよりも、いつもの慣れた方法や定番のやり方を選ぶことが多い。", trait:"O", sign:-1, tag:"安定と安心" },
    { text:"締め切り直前になってから、宿題や片付けをあわてて進めることが多い。", trait:"C", sign:-1, tag:"マイペース度" },
    { text:"大勢でにぎやかに過ごすより、一人で静かに過ごす時間の方が落ち着く。", trait:"E", sign:-1, tag:"内省と休息" },
    { text:"人に合わせるだけでなく、自分の考えやこだわりも大切にしたい。", trait:"A", sign:-1, tag:"自己主張力" },
    { text:"トラブルや急な予定変更があっても、落ち着いて対応できる方だ。", trait:"S", sign:-1, tag:"心の回復力" }
  ];
  const OPTIONS = [
    { value:1, label:"ぜんぜんちがう", mark:"×" },
    { value:2, label:"ちがうかな", mark:"△" },
    { value:3, label:"どっちでもない", mark:"◇" },
    { value:4, label:"そうかも", mark:"🌸" },
    { value:5, label:"すごくそう！", mark:"🌟" }
  ];

  const PLANTS = {
    MINT:{emoji:"🍃", plant:"ミント", base:"ハッピー案内所", short:"人と人をつなぎ、場の空気を明るくするコミュニケーションのハーブ。"},
    LAVENDER:{emoji:"💜", plant:"ラベンダー", base:"お片付け隊長", short:"落ち着いた段取りで、安心できる流れをつくる整え上手なハーブ。"},
    ANEMONE:{emoji:"🌸", plant:"アネモネ", base:"お庭のデコレーター", short:"アイデアと表現力で、周りの『やってみたい』を引き出すハーブ。"},
    OLIVE:{emoji:"🌿", plant:"オリーブ", base:"もくもく農業クラフター", short:"じっくり見守り、相手のペースを大切にできるあたたかなハーブ。"},
    ROSE:{emoji:"🌹", plant:"ローズ", base:"きまぐれな風来坊", short:"自分らしい美学を持ち、新しい道をひらく個性派ハーブ。"},
    IVY:{emoji:"🍀", plant:"アイビー", base:"図書室のハーブ魔女", short:"静かな観察力と知的好奇心で、物語を深く味わうハーブ。"},
    EUCALYPTUS:{emoji:"🌱", plant:"ユーカリ", base:"森のパトロールレンジャー", short:"動きながら状況を整え、いざという時に頼りになるハーブ。"},
    SWEETPEA:{emoji:"🌺", plant:"スイートピー", base:"ちいさな落とし物ハンター", short:"小さな気持ちの変化に気づき、そっと寄り添えるやさしいハーブ。"}
  };
  const PROFILES = {
    MINT:{o:6,c:5,e:9,a:8,s:5}, LAVENDER:{o:4,c:9,e:4,a:7,s:4}, ANEMONE:{o:9,c:5,e:8,a:6,s:5}, OLIVE:{o:5,c:7,e:4,a:9,s:4},
    ROSE:{o:9,c:4,e:5,a:3,s:5}, IVY:{o:8,c:6,e:3,a:5,s:5}, EUCALYPTUS:{o:6,c:6,e:8,a:5,s:3}, SWEETPEA:{o:5,c:5,e:3,a:8,s:9}
  };
  const ORDER = ["MINT","LAVENDER","ANEMONE","OLIVE","ROSE","IVY","EUCALYPTUS","SWEETPEA"];
  const SUBTYPES = {
    MINT:{BLOOM:{name:"にぎわいミント", badge:"外へ咲く型", line:"声をかけるだけで、場がふわっと明るくなる人。", hint:"人と人をつなぐ場面で力を発揮しそう。"}, ROOT:{name:"ほっとミント", badge:"内に根づく型", line:"近くにいると安心できる、やさしい空気を広げる人。", hint:"一人ひとりとの関係づくりに向いていそう。"}},
    LAVENDER:{BLOOM:{name:"てきぱきラベンダー", badge:"外へ咲く型", line:"準備・段取り・実行で、みんなをさりげなく支える人。", hint:"行事や実習の場面で頼られそう。"}, ROOT:{name:"しずかなラベンダー", badge:"内に根づく型", line:"落ち着いた環境をつくり、安心の土台を整える人。", hint:"安全管理や生活のリズムづくりに強みがありそう。"}},
    ANEMONE:{BLOOM:{name:"ステージアネモネ", badge:"外へ咲く型", line:"表現する楽しさを広げ、周りの心を動かす人。", hint:"造形・音楽・劇遊びなどで魅力が咲きそう。"}, ROOT:{name:"アトリエアネモネ", badge:"内に根づく型", line:"静かな創造性で、世界観をじっくり形にする人。", hint:"教材づくりや環境構成でセンスが活きそう。"}},
    OLIVE:{BLOOM:{name:"支え合いオリーブ", badge:"外へ咲く型", line:"あたたかさを行動に変えて、支援の輪を広げる人。", hint:"チームで子どもや家庭を支える場面に向いていそう。"}, ROOT:{name:"見守りオリーブ", badge:"内に根づく型", line:"急がせず、比べず、相手の成長を待てる人。", hint:"乳幼児保育や個別支援で強みが出そう。"}},
    ROSE:{BLOOM:{name:"冒険ローズ", badge:"外へ咲く型", line:"前例にとらわれず、新しいやり方を試せる人。", hint:"探究型の活動や新しい企画で輝きそう。"}, ROOT:{name:"美学ローズ", badge:"内に根づく型", line:"自分のこだわりを大切にしながら、質を高める人。", hint:"その子らしさを守る関わりに向いていそう。"}},
    IVY:{BLOOM:{name:"探究アイビー", badge:"外へ咲く型", line:"発見したことを分かち合い、学ぶ楽しさを広げる人。", hint:"自然観察や調べ学習で力を発揮しそう。"}, ROOT:{name:"物語アイビー", badge:"内に根づく型", line:"静かな観察力で、心の奥の物語を受け止める人。", hint:"読み聞かせや記録、内面理解に向いていそう。"}},
    EUCALYPTUS:{BLOOM:{name:"リーダーユーカリ", badge:"外へ咲く型", line:"元気よく前に出て、困った時にも場を動かせる人。", hint:"野外活動や行事で頼もしさが咲きそう。"}, ROOT:{name:"守り手ユーカリ", badge:"内に根づく型", line:"落ち着いた判断で、みんなの安心を守れる人。", hint:"危機対応や見守りの場面で信頼されそう。"}},
    SWEETPEA:{BLOOM:{name:"つなぐスイートピー", badge:"外へ咲く型", line:"小さな気持ちを言葉にして、人と人をやさしくつなぐ人。", hint:"友達関係や保護者との橋渡しで力が出そう。"}, ROOT:{name:"そっと寄り添うスイートピー", badge:"内に根づく型", line:"声にならない不安に気づき、静かに寄り添える人。", hint:"安心できる居場所づくりで強みが咲きそう。"}}
  };

  const state = { started:false, answers:Array(10).fill(null), index:0, loading:false, result:null };
  const app = document.getElementById('app');
  const toast = document.getElementById('toast');
  const strip = document.getElementById('mguOfficialStrip');
  strip.innerHTML = `<span>${esc(MGU.name)}</span><span class="mgu-chip ${OFFICIAL_MODE?'official':'pending'}">${OFFICIAL_MODE?MGU.officialLabel:MGU.safeLabel}</span>`;

  function esc(s){ return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
  function scoreAnswers(){
    const scores = {o:0,c:0,e:0,a:0,s:0};
    state.answers.forEach((ans,i)=>{ const q=QUESTIONS[i]; const v=q.sign===1?ans:6-ans; scores[q.trait.toLowerCase()] += v; });
    return scores;
  }
  function dist(a,b){ return ['o','c','e','a','s'].reduce((sum,k)=>sum+Math.pow(a[k]-b[k],2),0); }
  function pickPlant(scores){ return ORDER.map((key,i)=>({key,i,d:dist(scores,PROFILES[key])})).sort((a,b)=>a.d-b.d||a.i-b.i)[0].key; }
  function pickSubtype(key,s){
    switch(key){
      case 'MINT': return s.e >= s.a + 1 ? 'BLOOM':'ROOT';
      case 'LAVENDER': return s.e >= 6 ? 'BLOOM':'ROOT';
      case 'ANEMONE': return s.e >= 8 ? 'BLOOM':'ROOT';
      case 'OLIVE': return s.e >= 5 ? 'BLOOM':'ROOT';
      case 'ROSE': return s.e >= 6 ? 'BLOOM':'ROOT';
      case 'IVY': return s.o + s.e >= 12 ? 'BLOOM':'ROOT';
      case 'EUCALYPTUS': return s.e >= 8 ? 'BLOOM':'ROOT';
      case 'SWEETPEA': return s.e >= 5 ? 'BLOOM':'ROOT';
      default: return 'ROOT';
    }
  }
  function makeResult(){ const scores=scoreAnswers(); const key=pickPlant(scores); const sub=pickSubtype(key,scores); return {key, plant:PLANTS[key], subtype:SUBTYPES[key][sub]}; }
  function progress(){ return state.answers.filter(v=>v!==null).length; }
  function render(){
    if(state.loading){ app.innerHTML = `<section class="card loading"><div class="spinner"></div><h2>あなた色のハーブを育てています...</h2><p class="lead">10問の回答から、今日のあなたに近いタイプを選んでいます。</p></section>`; return; }
    if(state.result){ renderResult(); return; }
    if(!state.started){ renderStart(); return; }
    renderQuestion();
  }
  function renderStart(){
    app.innerHTML = `
      <section class="card hero">
        <div class="hero-emoji">🌼</div>
        <h2>3分で、あなた色のハーブが咲く</h2>
        <p class="lead">10の質問に答えると、16タイプの中からあなたに近い「ハーブタイプ」が表示されます。宮城学院女子大学 教育学科・幼児教育専攻の学びを、楽しくのぞいてみる無料体験版です。</p>
        <div class="mgu-mini"><strong>幼児教育専攻につながるポイント：</strong>子ども一人ひとりの発達を支える力、心理・福祉へのまなざし、ウェルビーイングを大切にする学びを、あなたの持ち味からイメージしてみましょう。</div>
        <div class="notice"><strong>お約束：</strong>これは自己理解と進路探究のきっかけとして楽しむ簡易コンテンツです。医学的・臨床的な診断や、進路適性を決めつけるものではありません。</div>
        <div class="actions"><button class="primary" data-action="start">診断をはじめる</button><a class="mgu-link" href="${MGU.specialUrl}" target="_blank" rel="noopener">幼児教育専攻を先に見る</a></div>
      </section>`;
  }
  function renderQuestion(){
    const q=QUESTIONS[state.index], count=progress();
    app.innerHTML = `
      <section class="card">
        <div class="progress-row"><span>QUESTION ${state.index+1} / 10</span><span>${count}問回答済み</span></div>
        <div class="bar"><span style="width:${count*10}%"></span></div>
        <div class="qtag">${esc(q.tag)}</div>
        <p class="question">${esc(q.text)}</p>
        <div class="options">
          ${OPTIONS.map(o=>`<button class="opt ${state.answers[state.index]===o.value?'selected':''}" data-action="answer" data-value="${o.value}"><span class="left"><span class="mark">${esc(o.mark)}</span><strong>${esc(o.label)}</strong></span><span>${state.answers[state.index]===o.value?'選択中':'○'}</span></button>`).join('')}
        </div>
        <div class="actions"><button class="ghost" data-action="prev" ${state.index===0?'disabled':''}>← 前の質問</button></div>
      </section>`;
  }
  function renderResult(){
    const r=state.result;
    const shareText = `わたし色のガーデン診断：私は「${r.subtype.name}」でした。${r.subtype.line}`;
    app.innerHTML = `
      <section class="result">
        <div class="result-top">
          <div class="result-emoji">${esc(r.plant.emoji)}</div>
          <div class="badge">${esc(r.subtype.badge)} / 無料診断結果</div>
          <h2 class="type-name">${esc(r.subtype.name)}</h2>
          <div class="plant-name">${esc(r.plant.base)}（${esc(r.plant.plant)}）</div>
          <p class="tagline">${esc(r.subtype.line)}</p>
        </div>
        <div class="mini-grid">
          <div class="mini"><h3>🌿 あなたの持ち味</h3><p>${esc(r.plant.short)}</p></div>
          <div class="mini"><h3>✨ 咲きやすい場面</h3><p>${esc(r.subtype.hint)}</p></div>
          <div class="mini"><h3>💬 今日のひとこと</h3><p>自分らしさは、誰かと比べるものではなく、育てていくもの。</p></div>
        </div>
        <div class="mgu-card">
          <h3>あなたの持ち味を、幼児教育の学びへ</h3>
          <p>この結果は、幼児教育・保育・心理・福祉の学びにふれるための入口です。宮城学院女子大学 教育学科・幼児教育専攻では、子ども一人ひとりの発達を支える力や、ウェルビーイングを大切にした学びを深めていきます。</p>
          <div class="mgu-buttons">
            <a class="mgu-link primary-link" href="${MGU.departmentUrl}" target="_blank" rel="noopener">専攻ページを見る</a>
            <a class="mgu-link" href="${MGU.specialUrl}" target="_blank" rel="noopener">特設サイトを見る</a>
            <a class="mgu-link" href="${MGU.openCampusUrl}" target="_blank" rel="noopener">OC情報を見る</a>
            <a class="mgu-link" href="${MGU.requestUrl}" target="_blank" rel="noopener">資料請求へ</a>
          </div>
          <div class="mgu-small">リンク先は宮城学院女子大学の公式サイトです。通信環境がない場合は、会場スタッフにお声がけください。</div>
        </div>
        <div class="cta-note"><strong>もっと詳しく知りたい人へ：</strong>詳細スコア、PDFレポート、学科別アドバイス、クラス・イベント集計は、拡張版として展開できます。オープンキャンパスではスタッフにお声がけください。</div>
        <div class="locked">
          <div class="lock"><b>🔒 詳細スコア</b><span>5つの特性のバランスを見える化</span></div>
          <div class="lock"><b>🔒 PDFレポート</b><span>保護者・面談・進路相談にも使える保存版</span></div>
          <div class="lock"><b>🔒 団体版</b><span>クラスやイベントのタイプ分布を集計</span></div>
        </div>
        <div class="actions">
          <button class="primary" data-action="again">もう一度診断する</button>
          <button class="secondary" data-action="copy" data-text="${esc(shareText)}">結果をコピー</button>
        </div>
        <p class="tiny">無料版では、結果は短く楽しく表示しています。詳しい解釈や保存機能は、商用・団体利用ラインの候補です。公式情報はリンク先の宮城学院女子大学サイトをご確認ください。</p>
      </section>`;
  }
  function showToast(text){ toast.textContent=text; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1600); }
  app.addEventListener('click', function(e){
    const btn=e.target.closest('button'); if(!btn) return;
    const action=btn.dataset.action;
    if(action==='start'){ state.started=true; render(); window.scrollTo({top:0,behavior:'smooth'}); }
    if(action==='answer'){ const val=Number(btn.dataset.value); state.answers[state.index]=val; render(); if(state.index<9){ setTimeout(()=>{state.index++; render();},120); } else { state.loading=true; render(); setTimeout(()=>{ state.result=makeResult(); state.loading=false; render(); window.scrollTo({top:0,behavior:'smooth'}); },520); } }
    if(action==='prev' && state.index>0){ state.index--; render(); }
    if(action==='again'){ state.started=false; state.answers=Array(10).fill(null); state.index=0; state.loading=false; state.result=null; render(); window.scrollTo({top:0,behavior:'smooth'}); }
    if(action==='copy'){ const text=btn.dataset.text||''; if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>showToast('結果をコピーしました')).catch(()=>showToast('コピーできませんでした')); } else { showToast('コピー機能はこの環境では使えません'); } }
  });
  render();
})();
</script>
</body>
</html>
