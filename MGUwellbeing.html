                    1: { badge: "Mindset (Psychology)", title: "Building an inner axis.", desc: "Use psychology to turn dependence into independence. Learn the joy of responsibility.", mind: "Independence Awakened" },
                    2: { badge: "Skillset (Nursery)", title: "Field x World.", desc: "Japan practice x Nordic study. Refine skills and find the shape of happiness yourself.", mind: "Perspective of Inquiry" },
                    3: { badge: "Frameset (Welfare)", title: "Design society.", desc: "ICT x Welfare. Create systems leaving no one behind, reaching <span class='highlight-text'>95% expertise in Design</span>.", mind: "Mission for Innovation" },
                    4: { badge: "Integration (Leadership)", title: "Integration.", desc: "Shape your 'Philosophy of Happiness' and shine as a leader who embodies well-being.", mind: "Transcendent Leader" }
                }
            }
        };

        const guardiansData = [
            { icon: "🧠", jaTitle: "【心理：マインドセット】", enTitle: "[Psychology: Mindset]", jaSub: "自分を支えるしなやかな軸を授ける", enSub: "Providing an axis", items: [
                { ja: ["教育心理（西浦先生）", "学びの喜びを爆発させる「可能性の引き出し方」"], en: ["Ed. Psych (Prof. Nishiura)", "Exploding the joy of learning"] },
                { ja: ["発達心理（平川先生）", "子どもの「今」を科学的に肯定する「絶対的な根拠」"], en: ["Dev. Psych (Prof. Hirakawa)", "Scientific absolute evidence"] },
                { ja: ["臨床心理（兪先生）", "誰かを救う前に自分を整える「真のレジリエンス」"], en: ["Clinical Psych (Prof. Yu)", "True resilience"] }
            ]},
            { icon: "🎨", jaTitle: "【保育：スキルセット】", enTitle: "[Nursery: Skillset]", jaSub: "幸福な環境を自らの手で創り出す", enSub: "Creating environment", items: [
                { ja: ["環境（伊藤先生）", "輝く瞬間をデザインする「空間の魔術師」"], en: ["Env. (Prof. Ito)", "Wizard of Space"] },
                { ja: ["健康（守先生）", "自分と子どものウェルビーイングを守り抜く「タフな愛」"], en: ["Health (Prof. Mori)", "Tough Love"] },
                { ja: ["造形（石川先生）", "想いを形にし、世界を美しく彩る「表現という武器」"], en: ["Art (Ishikawa)", "Weapon of Expression"] }
            ]},
            { icon: "🌍", jaTitle: "【福祉：フレームセット】", enTitle: "[Welfare: Frameset]", jaSub: "幸せを社会に実装する", enSub: "Social Implementation", items: [
                { ja: ["社会福祉（尾形先生・田中先生）", "制度と知恵を掛け合わせ、地域全体のウェルビーイングを構築する「社会の設計士」"], en: ["Social Welfare (Ogata & Tanaka)", "Architects of Society"] }
            ]}
        ];

        let currentLang = navigator.language.startsWith('en') ? 'en' : 'ja';
        let currentYear = 1;
        let growthChart;

        function toggleLanguage() {
            currentLang = currentLang === 'ja' ? 'en' : 'ja';
            applyLanguage();
        }

        function applyLanguage() {
            const data = i18n[currentLang];
            document.getElementById('html-root').setAttribute('lang', currentLang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.innerHTML = data[key];
            });
            document.getElementById('lang-btn-text').innerText = currentLang === 'ja' ? 'English' : '日本語';
            document.getElementById('future-body').innerHTML = data.futureBody;
            renderPersonas();
            renderVoices();
            updateJourney(currentYear);
            renderGuardians();
            if (growthChart) {
                growthChart.data.labels = data.chartLabels;
                growthChart.update();
            }
        }

        function renderPersonas() {
            const container = document.getElementById('persona-grid');
            container.innerHTML = i18n[currentLang].personas.map(p => `
                <a href="${p.link}" class="group block rounded-2xl bg-white border border-warm-200 p-6 text-left shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-md hover:border-accent focus:outline-none focus:ring-2 focus:ring-accent/40">
                    <div class="text-2xl mb-3 transition-transform duration-300 group-hover:scale-110 text-left">${p.icon}</div>
                    <h3 class="font-bold text-warm-900 mb-2 text-sm md:text-base leading-snug text-left">${p.title}</h3>
                    <p class="text-warm-600 text-xs md:text-sm leading-relaxed text-left">${p.sub}</p>
                    <div class="mt-4 text-accent text-xs font-bold flex items-center gap-1 transition-transform duration-300 group-hover:translate-x-1 text-left">
                        <span class="text-left">${currentLang === 'ja' ? '詳しく見る' : 'Learn More'}</span>
                        <span class="text-left">→</span>
                    </div>
                </a>
            `).join('');
        }

        function renderVoices() {
            const container = document.getElementById('voice-grid');
            container.innerHTML = i18n[currentLang].voices.map(v => `
                <div class="voice-card glass-card rounded-2xl p-5 border-l-4 border-accent shadow-sm">
                    <div class="flex items-center gap-2 mb-3 text-left">
                        <span class="text-xl text-left text-left">${v.icon}</span>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-warm-400 text-left text-left">${v.title}</span>
                    </div>
                    <p class="text-warm-900 font-bold text-sm leading-relaxed text-left text-left">${v.text}</p>
                </div>
            `).join('');
        }

        function renderGuardians() {
            const container = document.getElementById('guardian-grid');
            container.innerHTML = guardiansData.map((g, i) => `
                <div class="guardian-card glass-card rounded-2xl p-6 flex flex-col border-t-4 ${i===0?'border-t-accent':i===1?'border-t-warm-500':'border-t-warm-700'}">
                    <div class="text-3xl mb-4 text-left">${g.icon}</div>
                    <h3 class="text-lg font-bold text-warm-900 mb-1 text-left">${currentLang === 'ja' ? g.jaTitle : g.enTitle}</h3>
                    <p class="text-warm-600 text-[10px] italic mb-4 border-b border-warm-100 pb-2 text-left">${currentLang === 'ja' ? g.jaSub : g.enSub}</p>
                    <ul class="space-y-5 flex-grow">
                        ${g.items.map(item => `
                            <li class="flex items-start">
                                <span class="text-accent mr-3 mt-1 text-xs">▪</span>
                                <div><strong class="text-warm-800 text-[11px] block mb-0.5 text-left text-left">${item[currentLang][0]}</strong><span class="text-warm-500 text-[10px] leading-tight block text-left text-left">${item[currentLang][1]}</span></div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function updateJourney(year) {
            currentYear = year;
            document.querySelectorAll('.timeline-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 1) === year);
                btn.classList.toggle('bg-white', (idx + 1) !== year);
            });
            const data = i18n[currentLang].journey[year];
            const ids = ['journey-badge', 'journey-title', 'journey-desc', 'journey-mind'];
            ids.forEach(id => document.getElementById(id).style.opacity = 0);
            setTimeout(() => {
                document.getElementById('journey-badge').innerText = data.badge;
                document.getElementById('journey-title').innerText = data.title;
                document.getElementById('journey-desc').innerHTML = data.desc;
                document.getElementById('journey-mind').innerText = data.mind;
                ids.forEach(id => {
                    document.getElementById(id).style.transition = 'opacity 0.2s ease';
                    document.getElementById(id).style.opacity = 1;
                });
            }, 100);
            const scores = { 1: [80, 20, 10, 10, 40], 2: [85, 75, 60, 30, 55], 3: [90, 80, 70, 95, 85], 4: [100, 100, 100, 100, 100] };
            if (growthChart) { growthChart.data.datasets[0].data = scores[year]; growthChart.update(); }
        }

        window.onload = () => {
            const ctx = document.getElementById('growthChart').getContext('2d');
            const isMobile = window.innerWidth < 768;
            growthChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: i18n[currentLang].chartLabels,
                    datasets: [{
                        data: [80, 20, 10, 10, 40],
                        backgroundColor: 'rgba(217, 119, 119, 0.4)', borderColor: '#c27665', borderWidth: 2, pointBackgroundColor: '#c27665'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { r: { ticks: { display: false }, min: 0, max: 100, pointLabels: { font: { size: isMobile ? 9 : 11 }, padding: 10 } } },
                    plugins: { legend: { display: false } }
                }
            });
            applyLanguage();
        };

        window.addEventListener('resize', () => {
            if (growthChart) {
                const isMobile = window.innerWidth < 768;
                growthChart.options.scales.r.pointLabels.font.size = isMobile ? 9 : 11;
                growthChart.update();
            }
        });
    </script>
</body>
</html>
