                    <ul class="space-y-5 flex-grow">
                        ${g.items.map(item => `
                            <li class="flex items-start">
                                <span class="text-accent mr-3 mt-1 text-xs">▪</span>
                                <div><strong class="text-warm-800 text-[11px] block mb-0.5">${item[currentLang][0]}</strong><span class="text-warm-500 text-[10px] leading-tight block">${item[currentLang][1]}</span></div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function updateJourney(year) {
            currentYear = year;
            document.querySelectorAll('.timeline-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 1) === year);
                btn.classList.toggle('bg-white', (idx + 1) !== year);
            });
            const data = i18n[currentLang].journey[year];
            const elements = ['journey-badge', 'journey-title', 'journey-desc', 'journey-mind'];
            elements.forEach(id => document.getElementById(id).style.opacity = 0);
            setTimeout(() => {
                document.getElementById('journey-badge').innerText = data.badge;
                document.getElementById('journey-title').innerText = data.title;
                document.getElementById('journey-desc').innerHTML = data.desc;
                document.getElementById('journey-mind').innerText = data.mind;
                elements.forEach(id => {
                    document.getElementById(id).style.transition = 'opacity 0.2s ease';
                    document.getElementById(id).style.opacity = 1;
                });
            }, 100);
            const scores = { 1: [80,20,10,10,40], 2: [85,75,60,30,55], 3: [90,80,70,95,85], 4: [100,100,100,100,100] };
            if (growthChart) {
                growthChart.data.datasets[0].data = scores[year];
                growthChart.update();
            }
        }

        window.onload = () => {
            const ctx = document.getElementById('growthChart').getContext('2d');
            const isMobile = window.innerWidth < 768;
            growthChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: i18n[currentLang].chartLabels,
                    datasets: [{
                        data: [80, 20, 10, 10, 40],
                        backgroundColor: 'rgba(217, 119, 119, 0.4)', borderColor: '#c27665', borderWidth: 2, pointBackgroundColor: '#c27665'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { r: { ticks: { display: false }, min: 0, max: 100, pointLabels: { font: { size: isMobile ? 9 : 11 }, padding: 10 } } },
                    plugins: { legend: { display: false } }
                }
            });
            applyLanguage();
        };

        window.addEventListener('resize', () => {
            if (growthChart) {
                const isMobile = window.innerWidth < 768;
                growthChart.options.scales.r.pointLabels.font.size = isMobile ? 9 : 11;
                growthChart.update();
            }
        });
    </script>
</body>
</html>
