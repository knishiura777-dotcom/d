            };

        // チーム用初期メンバーデータ (10項目版回答値)

            { name: "サトウ（あなた）", answers: {1:4,2:2,3:4,4:5,5:4,6:1,7:2,8:1,9:1,10:2} }, // F-V-S
            { name: "みきぽん", answers: {1:5,2:4,3:4,4:3,5:1,6:1,7:1,8:1,9:2,10:4} }, // F-R-S
            { name: "すずか", answers: {1:1,2:5,3:1,4:2,5:1,6:5,7:1,8:5,9:4,10:5} }, // P-R-I
            { name: "ちひろ", answers: {1:2,2:2,3:1,4:5,5:5,6:4,7:3,8:4,9:1,10:1} }, // P-V-S
            { name: "あーちゃん", answers: {1:5,2:1,3:1,4:1,5:5,6:1,7:5,8:5,9:5,10:1} }  // D-V-I
        ];

        function runCalculations(answers) {
            const C = {};
            QUESTIONS.forEach(q => {
                const val = answers[q.id];
                if (val === undefined) {
                    C[q.id] = "";
                } else {
                    C[q.id] = q.reverse ? (6 - val) : val;
                }
            });

            const allAnswered = QUESTIONS.every(q => answers[q.id] !== undefined);
            if (!allAnswered) return null;

            // 10問簡易版：各因子2問ずつ (生合計値は最小2点、最大10点)
            // (sum - 2) / 8 * 100 で 0-100換算
            const getScore = (qIds) => {
                const sum = qIds.reduce((acc, id) => acc + (C[id] || 0), 0);
                return ((sum - 2) / 8) * 100;
            };

            const O = getScore([1, 6]);
            const C_score = getScore([2, 7]);
            const E = getScore([3, 8]);
            const A = getScore([4, 9]);
            const N = getScore([5, 10]);

            const scoreF = (O + E) / 2;
            const scoreD = (O + (100 - E)) / 2;
            const scoreH = ((100 - O) + E) / 2;
            const scoreP = ((100 - O) + (100 - E)) / 2;

            const l1Scores = { F: scoreF, D: scoreD, H: scoreH, P: scoreP };
            const sortedL1 = Object.entries(l1Scores).sort((a, b) => b[1] - a[1]);
            const firstL1 = sortedL1[0][0];
            const secondL1 = sortedL1[1][0];
            const purityL1 = Math.round(sortedL1[0][1]);
            const diffL1 = sortedL1[0][1] - sortedL1[1][1];
            const labelL1 = diffL1 === 0 ? "同率型" : (diffL1 >= 20 ? "明確なタイプ" : (diffL1 >= 10 ? "やや混合型" : "ハイブリッド型"));

            const scoreR = (C_score + (100 - N)) / 2;
            const scoreM = (C_score + N) / 2;
            const scoreG = ((100 - C_score) + (100 - N)) / 2;
            const scoreV = ((100 - C_score) + N) / 2;

            const l2Scores = { R: scoreR, M: scoreM, G: scoreG, V: scoreV };
            const sortedL2 = Object.entries(l2Scores).sort((a, b) => b[1] - a[1]);
            const firstL2 = sortedL2[0][0];
            const secondL2 = sortedL2[1][0];
            const purityL2 = Math.round(sortedL2[0][1]);
            const diffL2 = sortedL2[0][1] - sortedL2[1][1];
            const labelL2 = diffL2 === 0 ? "同率型" : (diffL2 >= 20 ? "明確なタイプ" : (diffL2 >= 10 ? "やや混合型" : "ハイブリッド型"));

            const scoreS = A;
            const scoreI = 100 - A;

            const l3Scores = { S: scoreS, I: scoreI };
            const sortedL3 = Object.entries(l3Scores).sort((a, b) => b[1] - a[1]);
            const firstL3 = sortedL3[0][0];
            const secondL3 = sortedL3[1][0];
            const purityL3 = Math.round(sortedL3[0][1]);
            const diffL3 = Math.abs(scoreS - scoreI);
            const labelL3 = diffL3 === 0 ? "同率型" : (diffL3 >= 20 ? "明確なタイプ" : (diffL3 >= 10 ? "やや混合型" : "ハイブリッド型"));

            const finalCode = `${firstL1}-${firstL2}-${firstL3}`;

            const targetO = (firstL1 === 'F' || firstL1 === 'D') ? O : (100 - O);
            const targetE = (firstL1 === 'F' || firstL1 === 'H') ? E : (100 - E);
            const targetC = (firstL2 === 'R' || firstL2 === 'M') ? C_score : (100 - C_score);
            const targetN = (firstL2 === 'M' || firstL2 === 'V') ? N : (100 - N);
            const targetA = (firstL3 === 'S') ? A : (100 - A);
            
            const matchScore = Math.round((targetO + targetE + targetC + targetN + targetA) / 5);

            return {
                ocean: { O, C: C_score, E, A, N },
                code: finalCode,
                matchScore,
                layers: {
                    energy: { primary: firstL1, purity: purityL1, secondary: secondL1, label: labelL1 },
                    adaptation: { primary: firstL2, purity: purityL2, secondary: secondL2, label: labelL2 },
                    relation: { primary: firstL3, purity: purityL3, secondary: secondL3, label: labelL3 }
                }
            };
        }

                                                    <option value="P-V-S">スイートピーセンサー (P-V-S)</option>
                                                </select>
                                                <button 
                                                    onClick={() => {
                                                        const select = document.getElementById('mock-code-select');
                                                        addMockMember(select.value);
                                                    }}
                                                    className="bg-brand-dark hover:bg-brand-sage text-[#FDFBF7] px-5 py-2.5 rounded-xl text-xs font-extrabold transition shrink-0"
                                                >
                                                    追加
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 中部マップグラフィック */}
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
                                    <div className="lg:col-span-8 bg-white border border-brand-sageLight p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] shadow-sm flex flex-col justify-between">
                                        <div className="text-center text-[10px] sm:text-xs font-bold text-brand-sage tracking-widest uppercase mb-3">
                                            ✿ 【お話大好き・寄せ植えエリア】
                                        </div>

                                        <div className="relative h-[320px] sm:h-[420px] bg-brand-linen/40 rounded-2xl border border-brand-sageLight flex items-center justify-center overflow-hidden">
                                            {/* 十字架マッピング軸 */}
                                            <div className="absolute w-full h-[1px] bg-brand-sageLight/50"></div>
                                            <div className="absolute h-full w-[1px] bg-brand-sageLight/50"></div>

                                            {/* 軸のラベル */}
                                            <span className="absolute left-2 text-[9px] sm:text-[10px] text-brand-sage bg-[#FDFBF7] px-1.5 py-0.5 rounded border border-brand-sageLight/50 font-bold max-w-[80px] sm:max-w-none text-center">
                                                【安定が好き】
                                            </span>
                                            <span className="absolute right-2 text-[9px] sm:text-[10px] text-brand-sage bg-[#FDFBF7] px-1.5 py-0.5 rounded border border-brand-sageLight/50 font-bold max-w-[80px] sm:max-w-none text-center">
                                                【新しいこと大好き】
                                            </span>

                                            {/* 自動マッピングされるお花たち */}
                                            {teamMembers.map((member, idx) => {
                                                const calc = runCalculations(member.answers);
                                                if (!calc) return null;

                                                const exploreX = ((calc.ocean.O + calc.ocean.E) / 2) - (((100 - calc.ocean.O) + (100 - calc.ocean.E)) / 2); 
                                                const relationY = calc.ocean.A - (100 - calc.ocean.A); 

                                                const leftPercent = 50 + (exploreX / 2.3); 
                                                const topPercent = 50 - (relationY / 2.3); 

                                                const colors = {
                                                    "F-R-S": "from-[#D5F3EE] to-[#C0ECE5] text-teal-950 border-teal-200",
                                                    "F-V-S": "from-[#FDF2F4] to-[#F5DCDC] text-pink-950 border-brand-blush/30",
                                                    "D-M-S": "from-[#EBE0F5] to-[#DFCCED] text-purple-950 border-purple-200",
                                                    "D-V-I": "from-[#FCEDEB] to-[#F7D8D5] text-rose-950 border-rose-200",
                                                    "H-R-S": "from-[#FCF7D9] to-[#F7EEAC] text-amber-950 border-amber-200",
                                                    "H-V-S": "from-[#FCECD9] to-[#FCD9C2] text-orange-950 border-orange-200",
                                                    "P-R-I": "from-[#E3F2E1] to-[#C8E6C4] text-emerald-950 border-emerald-200",
                                                    "P-V-S": "from-[#FCEDF4] to-[#F7D4E6] text-pink-950 border-pink-200"
                                                };
                                                const colorClass = colors[calc.code] || "from-brand-sageLight to-white text-brand-dark border-brand-sageLight";

                                                return (
                                                    <div 
                                                        key={idx}
                                                        className="absolute transform -translate-x-1/2 -translate-y-1/2 transition-all duration-500 hover:scale-105 z-10"
                                                        style={{ left: `${leftPercent}%`, top: `${topPercent}%` }}
                                                    >
                                                        <div className={`px-2 py-1 sm:px-3 sm:py-2 rounded-xl bg-gradient-to-r ${colorClass} text-[9px] sm:text-[10px] font-bold border shadow-md flex items-center gap-1 sm:gap-1.5 cursor-pointer whitespace-nowrap`}>
                                                            <span className="font-extrabold">{FULL_MASTER[calc.code]?.organism.split('（')[0]}</span>
                                                            <span className="bg-white/40 px-1 rounded font-bold text-brand-dark">{member.name}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="text-center text-[10px] sm:text-xs font-bold text-brand-sage tracking-widest uppercase mt-3">
                                            ✿ 【自分を大切に守る・一本立ちエリア】
                                        </div>
                                    </div>

                                    {/* メンバーリスト削除コンソール */}
                                    <div className="lg:col-span-4 bg-[#FAF7F2] border border-brand-sageLight p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] shadow-sm flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-xs sm:text-sm font-bold text-brand-dark mb-3 sm:mb-4 flex items-center gap-2 font-serif tracking-wider">
                                                <UsersIcon className="w-4 h-4 text-brand-sage" />
                                                集まったお友達の根っこ
                                            </h3>
                                            <div className="space-y-2 sm:space-y-3 max-h-[220px] sm:max-h-[300px] overflow-y-auto pr-1 custom-scrollbar">
                                                {teamMembers.map((member, idx) => {
                                                    const calc = runCalculations(member.answers);
                                                    if (!calc) return null;
                                                    const meta = FULL_MASTER[calc.code];

                                                    return (
                                                        <div key={idx} className="bg-white p-3 rounded-2xl border border-brand-sageLight flex items-center justify-between">
                                                            <div className="min-w-0">
                                                                <span className="text-xs font-extrabold text-brand-dark block truncate">{member.name}</span>
                                                                <span className="text-[9px] sm:text-[10px] text-brand-sage font-bold truncate block">
                                                                    {calc.code} ➔ {meta.organism}
                                                                </span>
                                                                <span className="text-[9px] sm:text-[10px] text-brand-blush font-bold truncate block">
                                                                    {getCareerAdvice(calc.code)?.glitterJobs[0]}
                                                                </span>
                                                            </div>
                                                            <div className="flex items-center gap-1.5 shrink-0">
                                                                <span className="bg-brand-sageLight text-brand-sage text-[8px] sm:text-[9px] font-bold px-2 py-1 rounded-full border border-brand-sageLight/50">
                                                                    {meta.role.split('（')[0]}
                                                                </span>
                                                                <button 
                                                                    onClick={() => deleteMember(idx)}
                                                                    className="text-brand-sage hover:text-brand-blush p-1 transition"
                                                                >
                                                                    <TrashIcon className="w-4 h-4" />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div className="mt-4 pt-4 border-t border-brand-sageLight text-[10px] sm:text-xs text-brand-sage font-bold leading-relaxed">
                                            ※お友達を増やすと、みんなが一緒に活動したときの生態系の形が変化して、より詳細なお庭診断シートが生成されます。
                                        </div>
                                    </div>
                                </div>

                                {/* 生態系調和診断レポート（女子大ライフ特化） */}
                                {(() => {
                                    const rolesCount = {};
                                    teamMembers.forEach(m => {
                                        const calc = runCalculations(m.answers);
                                        if (calc) {
                                            const r = FULL_MASTER[calc.code]?.role.split('（')[0];
                                            rolesCount[r] = (rolesCount[r] || 0) + 1;
                                        }
                                    });

                                    const total = teamMembers.length;
                                    const excessRoles = Object.entries(rolesCount).filter(([_, count]) => count / total > 0.4).map(([r]) => r);
                                    const lacksExecutor = !rolesCount["Executor"] && !rolesCount["Executor（ルーティン・品質維持）"];

                                    return (
                                        <div className="bg-white border-2 border-brand-sageLight/50 p-4 sm:p-8 rounded-[1.5rem] sm:rounded-[2rem] shadow-sm space-y-4 sm:space-y-6">
                                            <div>
                                                <h3 className="text-sm sm:text-base font-bold text-brand-dark flex items-center gap-2 font-serif tracking-wider">
                                                    <SparklesIcon className="w-5 h-5 text-brand-gold" />
                                                    お庭の「寄せ植え」協調レポート（チームの空気感）
                                                </h3>
                                                <p className="text-[10px] sm:text-xs text-brand-sage font-bold mt-1">
                                                    お友達同士の組み合わせから、どのような楽しいコラボレーションや女子大での学びに強いか自動計算しました。
                                                </p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 text-xs sm:text-sm font-semibold leading-relaxed">
                                                <div className="bg-brand-linen p-4 sm:p-5 rounded-2xl border border-brand-sageLight">
                                                    <h4 className="text-[10px] sm:text-xs font-extrabold text-brand-sage uppercase tracking-wider mb-2">わたしたちのお庭モデル</h4>
                                                    <span className="text-sm sm:text-lg font-bold text-brand-dark block">
                                                        ふんわり寄り添う、アロマ＆ミントネットワーク型
                                                    </span>
                                                    <p className="text-[11px] sm:text-xs text-brand-sage mt-2 leading-relaxed">
                                                        とにかくみんなが優しく、お互いの悩みや不満をゆっくり聞いて癒し合えるお庭です。女子大特有のギスギスしない、アットホームな居心地の良さを完璧に創り出せる素晴らしいグループ！
                                                    </p>
                                                </div>

                                                <div className="bg-brand-linen p-4 sm:p-5 rounded-2xl border border-brand-sageLight space-y-3 text-[11px] sm:text-xs leading-relaxed text-brand-dark font-bold">
                                                    <h4 className="text-[10px] sm:text-xs font-extrabold text-brand-sage uppercase tracking-wider">ときめき調和アドバイス</h4>
                                                    
                                                    {excessRoles.length > 0 && (
                                                        <div className="flex gap-2 text-brand-dark items-start font-bold">
                                                            <AlertTriangleIcon className="w-4 h-4 shrink-0 mt-0.5 text-brand-gold" />
                                                            <span>
                                                                <strong>同じ役割のお花が多いかも ({excessRoles.join(', ')})</strong>：<br />
                                                                みんなが「空気を読もう」としすぎて、本当にやりたいことが進まなくなることがあります。ときには甘えて本音を言ってみて。
                                                            </span>
                                                        </div>
                                                    )}

                                                    {lacksExecutor && (
                                                        <div className="flex gap-2 text-brand-dark items-start font-bold">
                                                            <AlertTriangleIcon className="w-4 h-4 shrink-0 mt-0.5 text-brand-blush" />
                                                            <span>
                                                                <strong>「まじめなオリーブ」がいない心配</strong>：<br />
                                                                イベントやお出かけの計画は盛り上がるけれど、誰が予約や連絡をするか押し付け合う傾向も。計画好きなラベンダータイプに頼りましょう！
                                                            </span>
                                                        </div>
                                                    )}

                                                    {!excessRoles.length && !lacksExecutor && (
                                                        <div className="flex gap-2 text-emerald-800 items-start font-bold">
                                                            <CheckIcon className="w-4 h-4 shrink-0 mt-0.5" />
                                                            <span>
                                                                <strong>完璧な寄せ植えの調和</strong>：おしゃべりなアネモネ、計画的なラベンダー、物静かなアイビーが、最高に美しいバランスで咲き誇っています。
                                                            </span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="pt-4 border-t border-brand-sageLight grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 text-[11px] sm:text-xs font-semibold">
                                                <div>
                                                    <h4 className="font-extrabold text-brand-sage uppercase tracking-wider mb-2">ふたりの相乗効果シナジー</h4>
                                                    <div className="space-y-2 text-brand-dark leading-relaxed">
                                                        <span className="text-brand-sage block font-extrabold">ミントネットワーク(F-V-S) × まじめなオリーブ(P-R-I)</span>
                                                        ミント型が「あれ可愛い！やりたい！」という新しい体験を外から持ち込み、それをオリーブ型が毎日コツコツ、宿題や準備といった定常タスクに確実に落とし込んでくれます。一過性で終わらない最高に信頼しあえるコンビ。
                                                    </div>
                                                </div>
                                                <div>
                                                    <h4 className="font-extrabold text-brand-blush uppercase tracking-wider mb-2">ときめきの摩擦注意報</h4>
                                                    <div className="space-y-2 text-brand-dark leading-relaxed">
                                                        <span className="text-brand-sage block font-extrabold">ワイルドローズ(D-V-I) × しっかりラベンダー(H-R-S)</span>
                                                        ラベンダーは「みんなのためにルールを守ろう！」と言いますが、ワイルドローズは「私は私のおしゃれと世界観を貫きたい！」と主張します。お互いに個性のルーツが異なること（共生と孤高）を認め合うのが、ハッピーの秘訣。
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* ==========================================
                            C. 32タイプ図鑑
                            ========================================== */}
                        {activeTab === 'info' && (
                            <div className="space-y-6">
                                <div className="bg-white border-2 border-brand-sageLight p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] shadow-sm">
                                    <h2 className="text-base sm:text-lg font-bold text-brand-dark mb-2 flex items-center gap-2 font-serif tracking-wider">
                                        <LayersIcon className="w-5 h-5 text-brand-sage" />
                                        BIO-CODE / PSY-CODE 32タイプお花図鑑
                                    </h2>
                                    <p className="text-xs text-brand-sage leading-relaxed font-bold">
                                        お庭をカタチづくる3つの心の層（クリエイティブ心、おしゃべり度、やさしさ度）のかけ合わせで生まれる、すべての植物やハーブ、お花のリストです。<br />
                                        女子高生向けの「エモ名称」と、オープンキャンパスや進路選びで役立つ「安全名称（ハッピー役割）」を見比べながら、あなたの気になるハーブを見つけてね。
                                    </p>
                                </div>

                                <div className="bg-gradient-to-br from-white to-brand-linen border border-brand-sageLight p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] shadow-sm space-y-5">
                                    <div>
                                        <span className="text-[10px] text-brand-blush font-extrabold tracking-widest uppercase">Qualification Cards</span>
                                        <h3 className="text-base sm:text-lg font-bold text-brand-dark font-serif mt-1">幼児教育専攻から広がる4つの資格・学びカード</h3>
                                        <p className="text-xs text-brand-sage font-bold leading-relaxed mt-2">
                                            資格は「この職業に決めるもの」ではなく、子ども・心理・福祉・地域・企業へ未来を広げる学びのカードとして表示しています。
                                        </p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                                        {QUALIFICATION_CARDS.map((card, idx) => (
                                            <div key={idx} className="bg-white border border-brand-sageLight rounded-2xl p-4 shadow-sm flex flex-col gap-3">
                                                <div>
                                                    <span className="text-[9px] text-brand-gold font-extrabold tracking-widest">CARD {idx + 1}</span>
                                                    <h4 className="text-sm font-extrabold text-brand-dark mt-1">{card.name}</h4>
                                                    <p className="text-xs text-brand-blush font-bold mt-1">{card.short}</p>
                                                </div>
                                                <div className="text-[10px] text-brand-sage font-semibold leading-relaxed space-y-2">
                                                    <p><strong className="text-brand-dark">専門職に近い活用：</strong>{card.pro}</p>
                                                    <p><strong className="text-brand-dark">専門職以外への応用：</strong>{card.broad}</p>
                                                </div>
                                                <div className="bg-brand-blushLight/50 border border-brand-blush/20 rounded-xl p-3">
                                                    <span className="text-[9px] text-brand-blush font-extrabold tracking-widest">キラキラ職業</span>
                                                    <p className="text-xs text-brand-dark font-extrabold leading-relaxed mt-1">{card.jobs.join(' / ')}</p>
                                                </div>
                                                <p className="text-[9px] text-brand-sage font-bold leading-relaxed">{card.note}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3 pt-3 border-t border-brand-sageLight">
                                        {SAFE_NUDGE_FLOW.map((item) => (
                                            <div key={item.step} className="bg-brand-linen border border-brand-sageLight rounded-xl p-3">
                                                <span className="text-[9px] text-brand-blush font-extrabold">STEP {item.step}</span>
                                                <h4 className="text-xs font-extrabold text-brand-dark mt-1">{item.title}</h4>
                                                <p className="text-[10px] text-brand-sage font-semibold leading-relaxed mt-1">{item.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {ALL_CODES.map(code => {
                                        const meta = FULL_MASTER[code];
                                        const isDetailed = MASTER_TABLE[code] !== undefined;

                                        return (
                                            <div 
                                                key={code} 
                                                className={`bg-white border p-4 sm:p-5 rounded-3xl transition duration-500 hover:border-brand-sage/60 relative overflow-hidden flex flex-col justify-between ${isDetailed ? 'border-brand-sage/40 shadow-sm shadow-brand-sageLight/20' : 'border-brand-sageLight opacity-85'}`}
                                            >
                                                {/* カード内ミニ背景 */}
                                                {isDetailed && (
                                                    <div className="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-brand-sage/5 to-transparent rounded-bl-full pointer-events-none" />
                                                )}

                                                <div className="space-y-3 relative z-10">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[9px] font-mono font-bold text-brand-dark bg-brand-sageLight/60 px-2 py-0.5 rounded-lg border border-brand-sageLight/50">
                                                            {code}
                                                        </span>
                                                        {isDetailed && (
                                                            <span className="text-[9px] bg-brand-sage/10 text-brand-sage border border-brand-sageLight/80 px-1.5 py-0.5 rounded-lg font-bold">
                                                                解説あり
                                                            </span>
                                                        )}
                                                    </div>

                                                    <div>
                                                        <h4 className="text-sm sm:text-md font-extrabold text-brand-dark">{meta.organism} タイプ</h4>
                                                        <span className="text-[10px] text-brand-sage font-bold">{meta.role}</span>
                                                    </div>

                                                    <div className="space-y-1 pt-2 border-t border-brand-sageLight">
                                                        <span className="text-[9px] text-brand-sage font-bold block">お仕事・進路での機能</span>
                                                        <p className="text-xs font-extrabold text-brand-dark leading-tight">{meta.safeName}</p>
                                                    </div>

                                                    <div className="space-y-1">
                                                        <span className="text-[9px] text-brand-blush font-bold block">インスタ映えエモ名称</span>
                                                        <p className="text-xs font-extrabold text-brand-blush leading-tight">{meta.edgeName}</p>
                                                    </div>

                                                    <div className="space-y-1 pt-2 border-t border-brand-sageLight">
                                                        <span className="text-[9px] text-brand-gold font-bold block">キラキラ職業イメージ</span>
                                                        <p className="text-xs font-extrabold text-brand-dark leading-tight">{getCareerAdvice(code)?.glitterJobs.slice(0, 2).join(' / ')}</p>
                                                    </div>
                                                </div>

                                                <div className="mt-4 pt-3 border-t border-brand-sageLight relative z-10">
                                                    <p className="text-[10px] sm:text-[11px] text-brand-sage font-semibold line-clamp-3 leading-relaxed">
                                                        {meta.overview}
                                                    </p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* フッター */}
                    <footer className="border-t border-brand-sageLight bg-white py-6 mt-12 text-center text-[10px] sm:text-xs text-brand-sage">
                        <div className="max-w-7xl mx-auto px-4 space-y-2">
                            <p className="font-bold">© 2026 わたし色のお庭診断 ［PSY-CODE（仮）生態系パーソナリティ・マップ］</p>
                            <p className="text-[9px] sm:text-[10px] text-brand-sage/80 max-w-lg mx-auto leading-relaxed font-semibold">
                                本診断システムは、信頼性の高いビッグファイブの理論に基づき、高校生の自己理解・進路選択・お友達との対話を優しく楽しみ、幼児教育専攻の学びや資格から広がる未来を安全に考えるために設計されています。
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
