<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺サイズ招待状（栞）デザイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 共通設定 */
        body {
            background-color: #f3f4f6;
            font-family: 'Noto Sans JP', sans-serif;
            color: #2d2d2d;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 画面表示用の設定 */
        .screen-only-flex {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card-container {
            perspective: 1200px;
        }
        .card {
            width: 55mm;
            height: 91mm;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            border-radius: 2px;
            background: #ffffff;
            box-sizing: border-box;
            border: 1px solid #f0f0f0;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .serif {
            font-family: 'Shippori Mincho', serif;
        }
        
        /* 縦書き設定 */
        .writing-vertical {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .qr-placeholder {
            width: 38px;
            height: 38px;
            background: #fdfdfd;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 0.5px solid #eee;
        }

        /* 印刷用設定 (Ctrl+P) */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            html, body {
                background: white !important;
                width: 210mm;
                height: 297mm;
            }
            .screen-only-flex {
                display: block !important;
                padding: 20mm !important;
            }
            .no-print {
                display: none !important;
            }
            .card-container {
                perspective: none !important;
            }
            .card {
                position: relative !important;
                display: flex !important;
                flex-direction: row !important;
                width: auto !important;
                height: auto !important;
                transform: none !important;
                box-shadow: none !important;
                gap: 15mm;
            }
            .card-face {
                position: relative !important;
                width: 55mm !important;
                height: 91mm !important;
                border: 0.1mm solid #ddd !important;
                transform: none !important;
                backface-visibility: visible !important;
                display: flex !important;
                visibility: visible !important;
            }
            .card-back {
                transform: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="screen-only-flex">
        <div class="mb-12 text-center no-print">
            <h1 class="text-lg font-light text-gray-500 mb-2 tracking-widest">招待状：名刺サイズ・栞</h1>
            <p class="text-[10px] text-gray-400 mb-6 tracking-wider">カードをクリックして裏面のレイアウトを確認</p>
            
            <button onclick="window.print()" class="px-8 py-2.5 bg-gray-800 text-white rounded-full text-[10px] tracking-widest hover:bg-gray-700 transition-all shadow-md active:scale-95">
                PRINT LAYOUT
            </button>
        </div>

        <div class="card-container">
            <div id="card" class="card relative">
                
                <!-- [表面] 静かな入り口 -->
                <div class="card-face">
                    <div class="flex-grow flex flex-col items-center justify-center text-center">
                        <p class="text-[9px] tracking-[0.4em] text-gray-400 font-light mb-10 leading-loose">
                            ウェルビーイングを<br>創造する
                        </p>
                        
                        <div class="space-y-1 mb-12">
                            <h2 class="text-xl serif tracking-[0.5em] font-medium text-gray-800 translate-x-[0.25em]">
                                「自立」
                            </h2>
                            <p class="text-sm serif tracking-[0.4em] text-gray-600 translate-x-[0.2em]">
                                の物語
                            </p>
                        </div>
                    </div>
                    
                    <div class="w-full text-center pb-2">
                        <p class="text-[7px] tracking-[0.2em] text-gray-300 font-light italic">
                            これは、履修案内ではありません。
                        </p>
                    </div>
                </div>

                <!-- [裏面] 縦書きの栞レイアウト（改行位置の最適化） -->
                <div class="card-face card-back items-start flex-row-reverse px-10 pt-10 pb-32">
                    <!-- メインコピー（縦書きでリズムを整える） -->
                    <div class="writing-vertical h-full flex flex-col justify-start">
                        <p class="text-[12px] serif leading-[3] tracking-[0.28em] text-gray-700">
                            心理を理解する前に、<br>
                            人とどう向き合うかを<br>
                            学んだ。
                        </p>
                    </div>
                    
                    <!-- フッター導線（下部に固定） -->
                    <div class="absolute bottom-5 left-0 w-full flex flex-col items-center space-y-3">
                        <div class="flex flex-col items-center space-y-1.5">
                            <div class="qr-placeholder">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-300"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><path d="M7 7h.01M17 7h.01M17 17h.01M7 17h.01"></path></svg>
                            </div>
                            <p class="text-[7px] tracking-[0.2em] text-gray-400 font-light scale-90">続きは、こちらから。</p>
                        </div>
                        <p class="text-[5px] tracking-[0.4em] text-gray-200 uppercase font-light">
                            Designed for Autonomy
                        </p>
                    </div>
                </div>

            </div>
        </div>

        <!-- Spec -->
        <div class="mt-16 max-w-xs w-full no-print text-center">
            <p class="text-[9px] text-gray-400 font-light tracking-widest">
                3行目を独立させ、言葉に余韻を持たせました
            </p>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        card.addEventListener('click', () => {
            card.classList.toggle('is-flipped');
        });
    </script>
</body>
</html>
